<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offer Coming</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f0ece4;
      height: 100vh;
      display: flex;
      overflow: hidden;
      color: #0d0d0d;
    }

    /* ── Auth Screen ── */
    #authScreen {
      position: fixed; inset: 0; z-index: 200;
      background: #f0ece4;
      display: flex; align-items: center; justify-content: center;
    }
    #authScreen.hidden { display: none; }
    .auth-box {
      background: #faf8f4; border-radius: 16px; padding: 36px 40px;
      width: 400px; max-width: 95vw;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .auth-logo-icon {
      width: 40px; height: 40px;
      background: #0d0d0d;
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
    }
    .auth-logo-text { font-size: 18px; font-weight: 700; color: #0d0d0d; }
    .auth-logo-sub  { font-size: 12px; color: #999080; margin-top: 2px; }
    .auth-title { font-size: 20px; font-weight: 700; color: #0d0d0d; margin-bottom: 6px; }
    .auth-sub   { font-size: 13px; color: #555048; margin-bottom: 24px; }
    .auth-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .auth-row label { font-size: 11px; font-weight: 600; color: #555048; text-transform: uppercase; letter-spacing: 0.5px; }
    .auth-row input {
      padding: 10px 13px; border: 1px solid #dcd8d0; border-radius: 8px;
      font-size: 13px; color: #0d0d0d; outline: none; transition: border-color 0.15s;
    }
    .auth-row input:focus { border-color: #c0392b; }
    .auth-btn {
      width: 100%; padding: 11px;
      background: #0d0d0d;
      color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; margin-top: 6px;
    }
    .auth-btn:hover { opacity: 0.9; }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-toggle {
      text-align: center; margin-top: 16px; font-size: 13px; color: #555048;
    }
    .auth-toggle a { color: #c0392b; cursor: pointer; font-weight: 500; text-decoration: none; }
    .auth-toggle a:hover { text-decoration: underline; }
    .auth-error {
      color: #dc2626; font-size: 12px; margin-bottom: 12px;
      background: #fee2e2; padding: 8px 12px; border-radius: 6px;
      display: none;
    }
    .auth-error.show { display: block; }


    /* ── App wrapper ── */
    #appWrapper {
      display: flex; width: 100%; height: 100%;
    }
    #appWrapper.hidden { display: none; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; min-width: 220px;
      background: #f8f6f2;
      border-right: 2px solid #dcd8d0;
      display: flex; flex-direction: column;
      padding: 14px 16px; gap: 10px;
      overflow: visible;
      position: relative; z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: #0d0d0d;
      border-radius: 9px; display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .logo-text { font-size: 15px; font-weight: 600; color: #0d0d0d; }
    .logo-sub  { font-size: 11px; color: #999080; margin-top: 1px; }
    .divider { height: 1px; background: #dcd8d0; }
    .section-title {
      font-size: 10px; font-weight: 600; letter-spacing: 1px;
      color: #999080; text-transform: uppercase; margin-bottom: 8px;
    }
    .add-btn {
      width: 100%; padding: 10px;
      background: #0d0d0d;
      color: #fff; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .add-btn:hover { opacity: 0.9; }
    .stat-row { display: flex; gap: 8px; }
    .stat-card {
      flex: 1; background: #f8f6f2; border: 1px solid #dcd8d0;
      border-radius: 8px; padding: 8px 10px;
    }
    .stat-value { font-size: 17px; font-weight: 700; color: #0d0d0d; line-height: 1; }
    .stat-label { font-size: 10px; color: #999080; margin-top: 3px; }
    .chart-block {
      background: #f8f6f2; border: 1px solid #dcd8d0;
      border-radius: 8px; padding: 10px;
    }
    .chart-block canvas { max-height: 120px; }
    .chart-block.countries-block { height: 160px; }
    .chart-block.countries-block canvas { max-height: 160px; }

    /* User info in sidebar */
    .user-row {
      display: flex; flex-direction: column; gap: 8px;
      padding: 10px 12px; background: #eeeae2; border: 1px solid #dcd8d0;
      border-radius: 10px;
    }
    .user-row-top { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: #0d0d0d;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
    }
    .user-email { font-size: 12px; color: #333028; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-actions { display: flex; align-items: center; gap: 4px; }
    .user-action-btn {
      flex: 1; padding: 5px 4px; font-size: 11px; font-weight: 500;
      color: #555048; background: #f8f6f2; border: 1px solid #dcd8d0;
      border-radius: 6px; cursor: pointer; text-align: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .user-action-btn:hover { background: #eeeae2; color: #0d0d0d; border-color: #dcd8d0; }
    .logout-btn {
      font-size: 11px; color: #555048; background: none; border: none;
      cursor: pointer; font-weight: 500; flex-shrink: 0; padding-left: 8px;
    }
    .logout-btn:hover { text-decoration: underline; }
    .chpwd-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center; }
    .chpwd-overlay.open { display:flex; }
    .chpwd-box { background:#faf8f4; border-radius:12px; padding:28px 24px; width:340px; box-shadow:0 8px 32px rgba(0,0,0,0.15); }
    .chpwd-box h3 { font-size:15px; font-weight:700; margin:0 0 20px; color:#0d0d0d; }
    .chpwd-box label { font-size:12px; font-weight:600; color:#333028; display:block; margin-bottom:4px; }
    .chpwd-box input { width:100%; box-sizing:border-box; border:1px solid #dcd8d0; border-radius:8px; padding:8px 10px; font-size:13px; margin-bottom:14px; }
    .chpwd-box input:focus { outline:none; border-color:#c0392b; }
    .chpwd-actions { display:flex; gap:8px; margin-top:4px; }
    .chpwd-actions button { flex:1; padding:9px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; }
    .chpwd-cancel { background:#eeeae2; color:#333028; }
    .chpwd-submit { background:#0d0d0d; color:#fff; }
    .chpwd-msg { font-size:12px; margin-bottom:10px; padding:8px 10px; border-radius:6px; display:none; }
    .chpwd-msg.error { display:block; background:#fee2e2; color:#dc2626; }
    .chpwd-msg.success { display:block; background:#d1fae5; color:#059669; }

    /* ── Main ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; position: relative;
      background: #f0ece4;
    }

    /* Applications list */
    .list-area {
      flex: 1; overflow-y: auto; padding: 6px 24px 14px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* Table header */
    .list-header {
      display: flex; align-items: center;
      padding: 0 16px; height: 30px;
      background: transparent; border: none;
      border-bottom: 2px solid #dcd8d0;
      border-radius: 0; margin: 10px 24px 4px; flex-shrink: 0;
    }
    .list-header span {
      font-size: 11px; font-weight: 600; color: #888070;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .app-card {
      background: #faf8f4; border: 1px solid #dcd8d0;
      border-left: 4px solid #dcd8d0;
      border-radius: 6px; padding: 8px 16px;
      display: flex; align-items: center;
      box-shadow:
        3px 3px 0 -1px #faf8f4,
        3px 3px 0 0     #dcd8d0,
        6px 6px 0 -1px  #eeeae2,
        6px 6px 0 0     #dcd8d0;
      transition: box-shadow 0.2s, transform 0.2s, background 0.15s;
    }
    .app-card:hover {
      background: #eeeae4;
      transform: translate(-1px, -2px);
      box-shadow:
        0 6px 18px rgba(0,0,0,0.07),
        3px 4px 0 -1px #faf8f4,
        3px 4px 0 0     #dcd8d0,
        6px 7px 0 -1px  #eeeae2,
        6px 7px 0 0     #dcd8d0;
    }
    .app-card[data-feedback="Offer"]             { border-left-color: #2a7a4a; }
    .app-card[data-feedback="Interview"]         { border-left-color: #2a5a9a; }
    .app-card[data-feedback="Online Assessment"] { border-left-color: #8a6010; }
    .app-card[data-feedback="Fail"]              { border-left-color: #c0392b; }
    .del-btn {
      width: 26px; height: 26px; border-radius: 5px; border: none;
      background: transparent; cursor: pointer; font-size: 14px;
      color: #dcd8d0; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .del-btn:hover { background: #fdecea; color: #c0392b; }
    .app-card.new-card { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .col-num      { flex: 0 0 28px; font-size: 11px; color: #aaa090; font-weight: 600; font-variant-numeric: tabular-nums; padding-right: 4px; }
    .col-company  { flex: 2; min-width: 0; font-size: 13px; font-weight: 600; color: #0d0d0d; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 12px; }
    .col-position { flex: 2; min-width: 0; font-size: 12px; color: #555048; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 12px; }
    .col-location { flex: 1; min-width: 0; font-size: 12px; color: #555048; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
    .col-worktype { flex: 0 0 90px; font-size: 12px; color: #555048; padding-right: 8px; }
    .col-link     { flex: 0 0 48px; padding-right: 8px; }
    .col-link a   { font-size: 12px; color: #c0392b; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
    .col-link a:hover { text-decoration: underline; }
    .col-date     { flex: 0 0 116px; font-size: 12px; color: #888070; padding-right: 8px; }
    .col-feedback { flex: 0 0 90px; padding-right: 8px; }

    .app-badge {
      font-size: 10px; font-weight: 800; padding: 2px 6px;
      border-radius: 3px; border: 1.5px solid currentColor;
      text-transform: uppercase; letter-spacing: 0.7px;
      display: inline-block; transform: rotate(-1.5deg); line-height: 1.4;
    }
    .badge-pending   { color: #888070; }
    .badge-fail      { color: #c0392b; }
    .badge-offer     { color: #2a7a4a; }
    .badge-interview { color: #2a5a9a; }
    .badge-oa        { color: #8a6010; }

    /* ── Chat overlay ── */
    .chat-sidebar {
      position: absolute; inset: 0;
      background: #faf8f4;
      display: flex; flex-direction: column;
      z-index: 20;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .chat-sidebar.hidden {
      opacity: 0; pointer-events: none;
      transform: translateY(6px);
    }
    .chat-topbar {
      padding: 0 16px; height: 44px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #dcd8d0;
    }
    .chat-topbar-title { font-size: 13px; font-weight: 600; color: #0d0d0d; }
    .chat-topbar-actions { display: flex; gap: 6px; }
    .chat-icon-btn {
      width: 26px; height: 26px; border-radius: 5px; border: none;
      background: transparent; cursor: pointer; font-size: 13px;
      color: #999080; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .chat-icon-btn:hover { background: #eeeae2; color: #555048; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .chat-bubble-wrap { display: flex; flex-direction: column; gap: 3px; }
    .chat-bubble-wrap.user { align-items: flex-end; }
    .chat-bubble-wrap.ai   { align-items: flex-start; }
    .chat-bubble {
      max-width: 75%; padding: 10px 14px;
      border-radius: 12px; font-size: 13px; line-height: 1.6;
    }
    .chat-bubble.user { background: #0d0d0d; color:#fff; border-bottom-right-radius:4px; }
    .chat-bubble.ai   { background: #eeeae2; color:#0d0d0d; border-bottom-left-radius:4px; }
    .chat-bubble.thinking { color: #999080; font-style: italic; }
    .chat-input-area {
      padding: 12px 16px; border-top: 1px solid #dcd8d0;
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .chat-input {
      flex: 1; padding: 9px 13px; border: 1px solid #dcd8d0;
      border-radius: 8px; font-size: 13px; font-family: inherit;
      resize: none; outline: none; max-height: 120px; line-height: 1.5;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: #c0392b; }
    .chat-send-btn {
      padding: 9px 16px; background: #0d0d0d;
      color: #fff; border: none; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
    }
    .chat-send-btn:hover { opacity: 0.9; }
    .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: #999080; font-size: 13px;
    }
    .chat-empty-icon { font-size: 32px; }
    .chat-suggestions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 8px; }
    .chat-suggestion {
      padding: 5px 11px; border: 1px solid #dcd8d0; border-radius: 20px;
      font-size: 12px; color: #555048; cursor: pointer; background: #faf8f4;
      transition: border-color 0.15s, color 0.15s;
    }
    .chat-suggestion:hover { border-color: #c0392b; color: #c0392b; }

    /* Ask AI toggle button */
    .ask-ai-btn {
      padding: 7px 14px; border-radius: 7px;
      background: #0d0d0d;
      color: #fff; border: none; font-size: 12px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
    }
    .ask-ai-btn:hover { opacity: 0.9; }
    .search-input {
      flex: 1; max-width: 280px; padding: 7px 12px;
      border: 1px solid #dcd8d0; border-radius: 7px;
      font-size: 13px; color: #0d0d0d; outline: none;
      background: #faf8f4; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: #c0392b; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #faf8f4; border-radius: 14px; padding: 28px;
      width: 460px; max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #0d0d0d; }
    .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .form-row label { font-size: 11px; font-weight: 600; color: #555048; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-row input, .form-row select {
      padding: 9px 12px; border: 1px solid #dcd8d0; border-radius: 7px;
      font-size: 13px; color: #0d0d0d; outline: none; transition: border-color 0.15s;
      background: #faf8f4;
    }
    .form-row input:focus, .form-row select:focus { border-color: #c0392b; }
    .form-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 10px; background: #eeeae2; border: none;
      border-radius: 7px; font-size: 13px; cursor: pointer; color: #333028;
    }
    .btn-save {
      flex: 2; padding: 10px;
      background: #0d0d0d;
      border: none; border-radius: 7px; font-size: 13px;
      font-weight: 600; color: #fff; cursor: pointer;
    }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Image parse area ── */
    .img-parse-area {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; margin-top: 16px; margin-bottom: 18px;
      background: #f0ece4; border: 1.5px dashed #dcd8d0;
      border-radius: 9px; cursor: pointer;
      transition: background 0.15s;
    }
    .img-parse-area:hover { background: #eeeae2; }
    .img-parse-area .img-parse-icon { font-size: 20px; flex-shrink: 0; }
    .img-parse-area .img-parse-text { flex: 1; }
    .img-parse-area .img-parse-text .img-parse-title {
      font-size: 13px; font-weight: 600; color: #0d0d0d;
    }
    .img-parse-area .img-parse-text .img-parse-sub {
      font-size: 11px; color: #555048; opacity: 0.7; margin-top: 2px;
    }
    .img-parse-status {
      font-size: 12px; color: #c0392b; margin-bottom: 14px;
      min-height: 18px; display: flex; align-items: center; gap: 6px;
    }
    .img-parse-status.error { color: #ef4444; }
    .img-parse-status.success { color: #10b981; }

    /* ── Sidebar nav — bookmark spine style ── */
    .sidebar-nav {
      display: flex; flex-direction: column; gap: 5px;
      margin: 0 -16px;
    }
    .sidebar-tab {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px 11px 20px;
      border: none; border-radius: 0;
      background: transparent;
      font-size: 13px; font-weight: 500; color: #555048;
      cursor: pointer; text-align: left; width: 100%;
      border-left: 4px solid transparent;
      transition: background 0.18s, color 0.15s, border-color 0.15s, box-shadow 0.2s, border-radius 0.2s;
    }
    .sidebar-tab:hover {
      background: rgba(0,0,0,0.06);
      color: #0d0d0d;
    }
    .sidebar-tab[data-tab="jdmatch"]:hover,
    .sidebar-tab[data-tab="jdmatch"].active { border-left-color: #c0392b; }
    .sidebar-tab[data-tab="fate"]:hover,
    .sidebar-tab[data-tab="fate"].active    { border-left-color: #6a5a48; }
    .sidebar-tab[data-tab="tracker"]:hover,
    .sidebar-tab[data-tab="tracker"].active { border-left-color: #2a7a4a; }
    .sidebar-tab.active {
      background: #eeeae2;
      color: #0d0d0d; font-weight: 600;
      border-radius: 0 14px 14px 0;
      margin-right: -2px; padding-right: 16px;
      box-shadow: 3px 0 12px rgba(0,0,0,0.12);
    }
    .sidebar-tab-icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; font-weight: 700; letter-spacing: 0; }
    .main-tab-content { display: none; }
    .main-tab-content.active { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    .main-tab-content.tab-flip-out { display: flex !important; }

    @keyframes tabFlipOut {
      from { opacity: 1; transform: perspective(900px) rotateX(0deg) translateY(0); }
      to   { opacity: 0; transform: perspective(900px) rotateX(5deg) translateY(-14px); }
    }
    @keyframes tabFlipIn {
      from { opacity: 0; transform: perspective(900px) rotateX(-7deg) translateY(16px); }
      to   { opacity: 1; transform: perspective(900px) rotateX(0deg) translateY(0); }
    }
    .tab-flip-out { animation: tabFlipOut 0.15s ease-in  forwards; }
    .tab-flip-in  { animation: tabFlipIn  0.22s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    @keyframes resultBlockIn {
      from { opacity: 0; transform: perspective(700px) rotateX(-8deg) translateY(14px); }
      to   { opacity: 1; transform: none; }
    }
    .result-block-in { animation: resultBlockIn 0.32s cubic-bezier(0.22, 1, 0.36, 1) both; }

    /* ── JD Match page ── */
    .jd-layout {
      display: flex; gap: 20px; padding: 20px 24px;
      flex: 1; overflow: hidden; min-width: 0;
    }
    .jd-col {
      flex: 1; display: flex; flex-direction: column;
      gap: 12px; overflow-y: auto; min-width: 0;
    }
    .jd-col-label {

    /* ── Markdown result ── */

    .jd-empty-hint {

    /* ── Fate Tab ── */
    .fate-select {
      flex: 1; padding: 8px 12px; border: 1px solid #dcd8d0;
      border-radius: 8px; font-size: 13px; color: #1a1610;
      background: #faf8f4; outline: none; cursor: pointer;
      transition: border-color 0.15s;
    }
    .fate-select:focus { border-color: #555048; }

    @keyframes cosmicArrive {
      from { opacity:0; transform:translateY(28px) scale(0.93); filter:blur(4px); }
    }
    .cosmic-letter {
      max-width:420px; width:90%;
      background: #faf8f4;
      border:1px solid #dcd8d0;
      border-radius:14px;
      padding:36px 32px 32px;
      position:relative; overflow:hidden;
      box-shadow:0 4px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      animation:cosmicArrive 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .cosmic-letter::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background-image:
        radial-gradient(1px 1px at 14% 18%, rgba(60,45,30,0.22) 0%, transparent 100%),
        radial-gradient(1px 1px at 71% 11%, rgba(60,45,30,0.16) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 87% 32%, rgba(60,45,30,0.18) 0%, transparent 100%),
        radial-gradient(1px 1px at 32% 72%, rgba(60,45,30,0.13) 0%, transparent 100%),
        radial-gradient(1px 1px at 58% 85%, rgba(60,45,30,0.16) 0%, transparent 100%),
        radial-gradient(1px 1px at 44% 52%, rgba(60,45,30,0.11) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 58%, rgba(60,45,30,0.14) 0%, transparent 100%),
        radial-gradient(1px 1px at 6%  65%, rgba(60,45,30,0.10) 0%, transparent 100%),
        radial-gradient(1px 1px at 93% 75%, rgba(60,45,30,0.13) 0%, transparent 100%);
    }
    .cosmic-seal {
      text-align:center; font-size:26px; line-height:1;
      margin-bottom:12px; position:relative; z-index:1; opacity:0.55;
    }
    .cosmic-from {
      text-align:center; font-size:9px;
      color:#999080; letter-spacing:5px;
      margin-bottom:18px; position:relative; z-index:1;
    }
    .cosmic-rule {
      border:none; border-top:1px solid #dcd8d0;
      margin:0 0 22px; position:relative; z-index:1;
    }
    .cosmic-body {
      font-size:13.5px; color:#1a1610;
      line-height:2.15; text-align:center;
      white-space:pre-line;
      position:relative; z-index:1;
    }
    .cosmic-sig {
      margin-top:28px; text-align:right;
      font-size:9px; color:#aaa090;
      letter-spacing:3px; position:relative; z-index:1;
    }
    /* ── Fate Envelope ── */
    @keyframes envelopeFloat {
      0%,100% { transform:translateY(0); }
      50%      { transform:translateY(-10px); }
    }
    @keyframes envelopeGlow {
      0%,100% { box-shadow:0 6px 28px rgba(0,0,0,0.09); }
      50%      { box-shadow:0 12px 48px rgba(160,140,100,0.22), 0 0 32px rgba(200,180,140,0.15); }
    }
    @keyframes starFloat {
      0%   { opacity:0; transform:translateY(0) scale(0.6); }
      20%  { opacity:1; }
      80%  { opacity:0.8; }
      100% { opacity:0; transform:translateY(-60px) scale(1.2); }
    }
    .fate-envelope {
      width:min(540px,84vw); height:min(336px,52vw);
      position:relative; cursor:pointer;
      perspective:1000px;
      transition:filter 0.2s;
    }
    .fate-envelope:not(.loading):not(.open):hover {
      filter:drop-shadow(0 14px 32px rgba(0,0,0,0.13));
    }
    .fate-envelope.loading {
      pointer-events:none;
      animation:envelopeFloat 2s ease-in-out infinite;
    }
    .fate-envelope.loading .fate-envelope-body {
      animation:envelopeGlow 2s ease-in-out infinite;
    }
    .fate-envelope.loading .fate-envelope-label {
      animation:envelopeGlow 2s ease-in-out infinite;
    }
    /* 收取中浮动星星 */
    .fate-star-particle {
      position:absolute; font-size:14px; pointer-events:none;
      animation:starFloat 2s ease-out infinite;
      z-index:10;
    }
    .fate-envelope-body {
      width:100%; height:100%;
      background:#faf8f4;
      border:2px solid #c8c0b0;
      border-radius:4px;
      position:relative; overflow:hidden;
      box-shadow:0 6px 28px rgba(0,0,0,0.09);
      transition:box-shadow 0.4s;
    }
    /* top sealed flap — clip-path triangle so rotateX works */
    .fate-envelope-flap {
      position:absolute; top:0; left:0; right:0; height:50%;
      background:#e0d9cf;
      clip-path:polygon(0 0,100% 0,50% 100%);
      transform-origin:top center;
      transition:transform 0.75s cubic-bezier(0.4,0,0.2,1);
      z-index:3;
    }
    .fate-envelope.open .fate-envelope-flap { transform:rotateX(-185deg); }
    /* bottom V fold */
    .fate-envelope-fold {
      position:absolute; bottom:0; left:0; right:0; height:50%; z-index:2;
    }
    .fate-envelope-fold::before,
    .fate-envelope-fold::after {
      content:''; position:absolute; bottom:0; width:50%; height:100%;
      background:#ece7de;
    }
    .fate-envelope-fold::before { left:0;  clip-path:polygon(0 100%,100% 0,100% 100%); }
    .fate-envelope-fold::after  { right:0; clip-path:polygon(0 0,100% 100%,0 100%);   }
    /* center label */
    .fate-envelope-center {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center; z-index:4;
    }
    .fate-envelope-label {
      font-size:13px; color:#999080; letter-spacing:2px; pointer-events:none;
    }

    .admin-stat-label {
      font-size: 11px; font-weight: 600; color: #999080;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .admin-stat-value { font-size: 26px; font-weight: 700; line-height: 1; }

    .export-wrap { position: relative; margin-left: auto; }
    .export-menu {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: #faf8f4; border: 1px solid #dcd8d0; border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1); overflow: hidden; z-index: 50; min-width: 130px;
    }
    .export-menu.open { display: block; }
    .export-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; font-size: 13px; color: #333028; cursor: pointer;
      transition: background 0.12s;
    }
    .export-item:hover { background: #f8f6f2; }

    /* ── Mobile bottom nav ── */
    .mobile-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 56px; z-index: 100;
      background: #f8f6f2; border-top: 1px solid #dcd8d0;
    }
    .mobile-nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      font-size: 11px; color: #888070; font-weight: 500;
      padding: 0; font-family: inherit;
      transition: color 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .mobile-nav-btn.active { color: #0d0d0d; font-weight: 700; }
    .mobile-nav-icon { font-size: 20px; line-height: 1; }

    @media (max-width: 768px) {
      /* Sidebar hidden, bottom nav shown */
      .sidebar { display: none; }
      .mobile-nav { display: flex; }
      .main { padding-bottom: 56px; }

      /* Home tab */
      #tab-home > div:first-child { padding: 16px 16px 12px; }

      /* Tracker toolbar: allow wrap */
      #tab-tracker > div:first-child { flex-wrap: wrap; padding: 10px 12px 0; gap: 8px; }
      .search-input { max-width: 100%; flex: 1 1 120px; min-width: 0; }
      .ask-ai-btn { font-size: 12px; padding: 7px 10px; }

      /* Hide table header, use card layout */
      .list-header { display: none; }
      .list-area { padding: 6px 12px 14px; gap: 8px; }

      /* App card: 3-row mobile layout via flex-wrap */
      .app-card { flex-wrap: wrap; padding: 10px 12px; align-items: flex-start; }
      .col-num      { display: none; }
      .col-company  { order: 1; flex: 1 1 0; min-width: 0; font-size: 13px; padding-right: 6px; padding-bottom: 2px; }
      .col-feedback { order: 2; flex: 0 0 auto; padding-right: 4px; padding-bottom: 2px; }
      .del-btn      { order: 3; flex: 0 0 auto; padding-bottom: 2px; }
      .col-position { order: 4; flex: 0 0 calc(100% - 60px); min-width: 0; font-size: 12px; white-space: normal; padding: 1px 0 3px; }
      .col-link     { order: 5; flex: 0 0 auto; padding: 1px 0 3px 6px; }
      .col-date     { order: 6; flex: 1 1 0; font-size: 11px; color: #aaa090; padding: 1px 0 0; }
      .col-location { display: none; }
      .col-worktype { display: none; }
      .col-notes    { display: none; }

      /* JD Match: stack panels */
      #tab-jdmatch { flex-direction: column !important; overflow-y: auto !important; overflow-x: hidden !important; }
      #jdLeftPanel  { width: 100% !important; flex-shrink: 0; border-right: none !important; border-bottom: 1px solid #dcd8d0; min-height: 320px; max-height: 50vh; }
      #jdRightPanel { flex: 1; min-height: 300px; }
      #jdLeftCollapseBtn { display: none !important; }

      /* Fate envelope */
      .fate-envelope { width: min(94vw, 400px); height: min(59vw, 250px); }
      .cosmic-letter { padding: 24px 18px; width: 95%; }

      /* Modal */
      .modal { padding: 20px 16px; width: 96vw; }

      /* Admin box */
      .admin-box { max-height: 95vh; }

      /* Resume doc */
      .resume-doc { padding: 28px 16px; }
    }

    @media (max-width: 400px) {
      .col-position { flex: 0 0 calc(100% - 40px); }
    }

    /* ── Home tab ── */
    .sidebar-tab[data-tab="home"]:hover,
    .sidebar-tab[data-tab="home"].active { border-left-color: #b7791f; }

    .home-stat-card {
      background: #faf8f4; border: 1px solid #dcd8d0;
      border-left: 4px solid #dcd8d0;
      border-radius: 8px; padding: 14px 16px;
    }
    .home-stat-value { font-size: 28px; font-weight: 700; color: #0d0d0d; line-height: 1; }
    .home-stat-label { font-size: 10px; color: #888070; margin-top: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .home-recent-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: #faf8f4; border: 1px solid #dcd8d0;
      border-left: 4px solid #dcd8d0; border-radius: 6px;
      cursor: pointer; transition: background 0.15s;
      margin-bottom: 8px;
    }
    .home-recent-row:hover { background: #eeeae4; }
    .home-recent-row[data-feedback="Offer"]             { border-left-color: #2a7a4a; }
    .home-recent-row[data-feedback="Interview"]         { border-left-color: #2a5a9a; }
    .home-recent-row[data-feedback="Online Assessment"] { border-left-color: #8a6010; }
    .home-recent-row[data-feedback="Fail"]              { border-left-color: #c0392b; }
    .home-recent-company { font-size: 13px; font-weight: 600; color: #0d0d0d; }
    .home-recent-position { font-size: 12px; color: #555048; margin-top: 2px; }
    .home-recent-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .home-recent-date { font-size: 11px; color: #888070; }

    /* ── Tech News Feed ── */
    .news-feed-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:14px;
    }
    .news-feed-title {
      font-size:11px; font-weight:600; color:#888070;
      text-transform:uppercase; letter-spacing:0.8px;
    }
    .news-refresh-btn {
      font-size:13px; color:#888070; background:none; border:none;
      cursor:pointer; padding:2px 6px; border-radius:4px;
      transition:color 0.15s, background 0.15s;
    }
    .news-refresh-btn:hover { color:#0d0d0d; background:#eeeae2; }
    .news-item {
      display:block; padding:14px 0; border-bottom:1px solid #eeeae2;
      text-decoration:none; color:inherit;
      transition:background 0.12s;
    }
    .news-item:last-child { border-bottom:none; }
    .news-item:hover .news-item-title { color:#c0392b; }
    .news-item-meta {
      display:flex; align-items:center; gap:8px; margin-bottom:5px;
    }
    .news-item-source {
      font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px;
    }
    .news-item-date { font-size:10px; color:#aaa090; }
    .news-item-title {
      font-size:13px; font-weight:600; color:#0d0d0d; line-height:1.5;
      transition:color 0.12s;
    }
    .news-item-desc {
      font-size:12px; color:#888070; margin-top:4px; line-height:1.6;
    }
  </style>
</head>
<body>

  <!-- Auth Screen -->
  <div id="authScreen">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="auth-logo-icon">🔍</div>
        <div>
          <div class="auth-logo-text">Offer Coming</div>
          <div class="auth-logo-sub"></div>
        </div>
      </div>
      <div id="authTitle" class="auth-title" data-i18n="authTitleLogin"></div>
      <div id="authSub" class="auth-sub" data-i18n="authSubLogin"></div>
      <div class="auth-error" id="authError"></div>
      <div class="auth-row">
        <label data-i18n="authLabelEmail"></label>
        <input id="authEmail" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="auth-row">
        <label data-i18n="authLabelPassword"></label>
        <input id="authPassword" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="auth-row" id="inviteRow" style="display:none">
        <label data-i18n="authLabelInvite"></label>
        <input id="authInviteCode" type="text" data-i18n-placeholder="authInvitePlaceholder">
      </div>
      <button class="auth-btn" id="authBtn" onclick="submitAuth()" data-i18n="authBtnLogin"></button>
      <div class="auth-toggle">
        <span id="authToggleText" data-i18n="authToggleToRegister"></span>
        <a onclick="toggleAuthMode()"><span id="authToggleLink" data-i18n="authToggleLinkRegister"></span></a>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appWrapper" class="hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo" style="justify-content:space-between;">
        <div style="display:flex;align-items:center;">
          <div class="logo-text">Offer Coming</div>
        </div>
        <button id="langToggle" onclick="toggleLang()" style="font-size:11px;font-weight:600;color:#555048;background:#eeeae2;border:1px solid #dcd8d0;border-radius:5px;padding:3px 8px;cursor:pointer;flex-shrink:0;">EN</button>
      </div>

      <div class="user-row">
        <div class="user-row-top">
          <div class="user-avatar" id="userAvatar">—</div>
          <span class="user-email" id="userEmail">—</span>
        </div>
        <div class="user-actions">
          <button class="user-action-btn" onclick="openChangePwd()" data-i18n="changePwdBtn"></button>
          <button class="user-action-btn" onclick="logout()" data-i18n="logoutBtn"></button>
        </div>
      </div>

      <div class="divider"></div>

      <div style="display:flex;gap:8px;">
        <button class="add-btn" onclick="openFeedback()" style="flex:1;background:#eeeae2;color:#555048;border:1px solid #dcd8d0;font-size:11px;padding:8px 4px;" data-i18n="feedbackBtn"></button>
        <button class="add-btn" onclick="openDonate()" style="flex:1;background:#eeeae2;color:#555048;border:1px solid #dcd8d0;font-size:11px;padding:8px 4px;" data-i18n="donateBtn"></button>
      </div>
      <button class="add-btn" onclick="toggleChat()">💬 Ask AI</button>

      <div class="divider"></div>

      <nav class="sidebar-nav">
        <button class="sidebar-tab active" data-tab="home" onclick="switchMainTab('home')">
          <span data-i18n="tabHomeShort"></span>
        </button>
        <button class="sidebar-tab" data-tab="jdmatch" onclick="switchMainTab('jdmatch')">
          <span data-i18n="tabJdMatchShort"></span>
        </button>
        <button class="sidebar-tab" data-tab="tracker" onclick="switchMainTab('tracker')">
          <span data-i18n="tabTrackerShort"></span>
        </button>
        <button class="sidebar-tab" data-tab="fate" onclick="switchMainTab('fate')">
          <span data-i18n="tabFateShort"></span>
        </button>
      </nav>

    </aside>

    <!-- Mobile bottom nav -->
    <nav class="mobile-nav">
      <button class="mobile-nav-btn active" data-tab="home" onclick="switchMainTab('home')">
        <span class="mobile-nav-icon">🏠</span>
        <span data-i18n="tabHomeShort"></span>
      </button>
      <button class="mobile-nav-btn" data-tab="jdmatch" onclick="switchMainTab('jdmatch')">
        <span class="mobile-nav-icon">📄</span>
        <span data-i18n="tabJdMatchShort"></span>
      </button>
      <button class="mobile-nav-btn" data-tab="tracker" onclick="switchMainTab('tracker')">
        <span class="mobile-nav-icon">📋</span>
        <span data-i18n="tabTrackerShort"></span>
      </button>
      <button class="mobile-nav-btn" data-tab="fate" onclick="switchMainTab('fate')">
        <span class="mobile-nav-icon">✨</span>
        <span data-i18n="tabFateShort"></span>
      </button>
    </nav>

    <!-- Main -->
    <main class="main">

      <!-- Tab: Home -->
      <div id="tab-home" class="main-tab-content active" style="flex-direction:column;overflow-y:auto;">
        <div style="padding:32px 36px 20px;flex-shrink:0;max-width:860px;width:100%;">

          <!-- Welcome header -->
          <div style="margin-bottom:28px;">
            <div style="font-size:13px;font-weight:600;color:#b7791f;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;" id="homeDate"></div>
            <div style="font-size:24px;font-weight:700;color:#0d0d0d;line-height:1.2;" id="homeWelcome" data-i18n="homeWelcomeDefault"></div>
          </div>

          <!-- Stats grid -->
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;">
            <div class="home-stat-card" style="border-left-color:#0d0d0d;">
              <div class="home-stat-value" id="homeStat-total">—</div>
              <div class="home-stat-label" data-i18n="homeStatTotal"></div>
            </div>
            <div class="home-stat-card" style="border-left-color:#2a5a9a;">
              <div class="home-stat-value" id="homeStat-interview" style="color:#2a5a9a;">—</div>
              <div class="home-stat-label" data-i18n="homeStatInterview"></div>
            </div>
            <div class="home-stat-card" style="border-left-color:#2a7a4a;">
              <div class="home-stat-value" id="homeStat-offer" style="color:#2a7a4a;">—</div>
              <div class="home-stat-label" data-i18n="homeStatOffer"></div>
            </div>
          </div>

          <!-- News Feed -->
          <div>
            <div class="news-feed-header">
              <div class="news-feed-title">科技资讯</div>
              <button class="news-refresh-btn" onclick="loadNewsFeed(true)" title="刷新">↻</button>
            </div>
            <div id="newsItemsArea">
              <div style="color:#aaa090;font-size:13px;text-align:center;padding:40px 0;">切换到此页面自动加载</div>
            </div>
          </div>

        </div>
      </div>

      <!-- Tab: Applications tracker -->
      <div id="tab-tracker" class="main-tab-content" style="flex-direction:column;">
        <div style="padding:14px 24px 0;flex-shrink:0;display:flex;gap:10px;align-items:center;">
          <button class="ask-ai-btn" onclick="triggerAutoParseModal()" data-i18n="autoParseBtn"></button>
          <button class="ask-ai-btn" onclick="openModal()" id="addAppBtn" data-i18n="addBtn"></button>
          <input class="search-input" id="searchInput" type="text" data-i18n-placeholder="searchPlaceholder" oninput="filterApplications()">
          <div class="export-wrap">
            <button class="ask-ai-btn" onclick="toggleExportMenu(event)" style="background:#eeeae2;color:#0d0d0d;border:1px solid #dcd8d0;" data-i18n="downloadBtn"></button>
            <div class="export-menu" id="exportMenu">
              <div class="export-item" onclick="downloadCSV(); closeExportMenu()">📄 CSV</div>
              <div class="export-item" onclick="downloadPDF(); closeExportMenu()">📑 PDF</div>
            </div>
          </div>
        </div>

        <!-- Table header -->
        <div class="list-header">
          <span class="col-num"></span>
          <span style="flex:0 0 48px" data-i18n="colLink"></span>
          <span style="flex:0 0 116px;cursor:pointer;user-select:none;" onclick="toggleSort()" id="sortHeader"><span data-i18n="colDate"></span> <span id="sortIcon">↓</span></span>
          <span style="flex:2;min-width:0" data-i18n="colCompany"></span>
          <span style="flex:2;min-width:0" data-i18n="colPosition"></span>
          <span style="flex:1;min-width:0" data-i18n="colLocation"></span>
          <span style="flex:0 0 90px" data-i18n="colWorkType"></span>
          <span style="flex:0 0 90px" data-i18n="colFeedback"></span>
          <span style="width:36px;flex-shrink:0;font-size:12px;font-weight:600;color:#888070;text-transform:uppercase;letter-spacing:0.5px;" data-i18n="colNotes"></span>
          <span style="width:26px;flex-shrink:0"></span>
        </div>

        <!-- Applications list -->
        <div class="list-area" id="listArea">
          <div style="color:#888070;font-size:13px;text-align:center;padding:40px 0;" id="listLoading" data-i18n="loading"></div>
        </div>

        <!-- Pagination -->
        <div id="pagination" style="padding:8px 24px 12px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:40px;"></div>
      </div>

      <!-- Tab: JD Match -->
      <div id="tab-jdmatch" class="main-tab-content" style="flex-direction:row;overflow:hidden;position:relative;">

        <!-- Left: Inputs -->
        <button id="jdLeftCollapseBtn" onclick="toggleJdLeftPanel()" title="折叠面板">‹</button>

            <div style="display:flex;align-items:baseline;gap:8px;">
              <div class="jd-col-label" data-i18n="jdLabelResume"></div>
              <span style="font-size:11px;color:#b0a898;">PDF · TXT · MD</span>
            </div>
            <div class="jd-save-row" style="margin-top:6px;">
              <button class="jd-sm-btn" onclick="document.getElementById('jdResumeFile').click()" data-i18n="resumeUploadBtn"></button>
              <input type="file" id="jdResumeFile" accept=".pdf,.txt,.md" style="display:none" onchange="handleResumeUpload(this)">
              <span id="jdResumeFileName" style="font-size:11px;color:#888070;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;"></span>
              <button class="jd-sm-btn" onclick="clearResume()" data-i18n="jdClearResumeBtn"></button>
            </div>
          </div>

          <!-- JD -->
          <div style="flex:1;display:flex;flex-direction:column;padding:0 20px 20px;min-height:0;">
            <div style="display:flex;align-items:baseline;gap:8px;">
              <div class="jd-col-label" data-i18n="jdLabelJD"></div>
              <span style="font-size:11px;color:#b0a898;">PDF · TXT · MD</span>
            </div>
            <div class="jd-save-row" style="margin-top:6px;">
              <button class="jd-sm-btn" onclick="document.getElementById('jdJDFile').click()" data-i18n="resumeUploadBtn"></button>
              <input type="file" id="jdJDFile" accept=".pdf,.txt,.md" style="display:none" onchange="handleJDUpload(this)">
              <span id="jdJDFileName" style="font-size:11px;color:#888070;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;"></span>

          </div>

          <!-- Scrollable content area -->
          <div id="jdScrollArea" style="flex:1;overflow-y:auto;min-height:0;">
            <!-- Analyze tab content -->
            <div id="jdEmptyHintBox" style="display:flex;align-items:center;justify-content:center;color:#b0a99c;font-size:13px;text-align:center;padding:60px 40px;min-height:200px;" data-i18n="jdEmptyHint"></div>
            <div id="jdResultSection" style="display:none;padding:20px 24px 32px;">
              <div id="jdResultBox"></div>
            </div>
            <!-- Optimize tab content -->
            <div id="jdOptEmptyHintBox" style="display:none;align-items:center;justify-content:center;color:#b0a99c;font-size:13px;text-align:center;padding:60px 40px;min-height:200px;" data-i18n="jdOptEmptyHint"></div>
            <div id="jdResumeArea" style="display:none;background:#ede9e3;padding:0;min-height:100%;">
              <div id="jdOptResultBox"></div>

            <div id="jdAnalyzeFooter" style="padding:16px 20px;">

            <div id="jdOptFooter" style="display:none;padding:16px 20px;">
              <button class="jd-analyze-btn" id="jdOptBtn" onclick="optimizeResume()" data-i18n="resumeOptBtn" style="width:100%;"></button>

            <div id="jdDlWrap" style="display:none;padding:12px 20px;gap:10px;flex-wrap:wrap;">
              <button class="jd-sm-btn" onclick="downloadResumeDocx()" style="background:#2b5a2b;color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;">📄 Word (.docx)</button>
              <button class="jd-sm-btn" onclick="downloadResumePdf()" style="background:#8b0000;color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;">📑 PDF (.pdf)</button>
              <button class="jd-sm-btn" onclick="downloadResumeMd()" style="background:#5a4a8b;color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;">📝 Markdown (.md)</button>
              <button class="jd-sm-btn" onclick="downloadResumeTxt()" style="background:#555048;color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;">📃 Text (.txt)</button>
            </div>
          </div>

        </div>

      <!-- Tab: Fate -->
      <div id="tab-fate" class="main-tab-content" style="flex-direction:column;">

        <div style="padding:24px 24px 12px;flex-shrink:0;display:flex;align-items:center;">
          <select id="fateAppSelect" class="fate-select"></select>
        </div>

let currentLang = localStorage.getItem('lang') || 'zh';

function t(key, ...args) {
  const val = LANGS[currentLang][key];
  if (val === undefined) return key;
  return typeof val === 'function' ? val(...args) : val;
}

function applyLang() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('[data-i18n-opt]').forEach(el => {
    el.textContent = t(el.dataset.i18nOpt);
  });

  const label = currentLang === 'zh' ? 'EN' : '中';
  ['langToggle','langToggleAdmin'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = label;
  });
  renderChatSuggestions();
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', currentLang);
  applyLang();
  // re-render dynamic content that depends on language
  if (allApps.length) renderPage();
  if (allApps.length) renderHome();
}

function renderChatSuggestions() {
  const container = document.getElementById('chatSuggestionsContainer');
  if (!container) return;
  container.innerHTML = t('chatSuggestions').map(s =>
    `<button class="chat-suggestion" onclick="sendSuggestion(this)">${esc(s)}</button>`
  ).join('');
}

// ── Auth helpers ──

function getToken() { return localStorage.getItem('jwt_token'); }
function getEmail() { return localStorage.getItem('user_email'); }

function authHeader() {
  return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' };
}

function isAdmin() {
  try {
    const token = getToken();
    if (!token) return false;
    const payload = JSON.parse(atob(token.split('.')[1]));
    return !!payload.adm;
  } catch { return false; }
}

function setSession(token, email) {
  localStorage.setItem('jwt_token', token);
  localStorage.setItem('user_email', email);
}

function clearSession() {
  localStorage.removeItem('jwt_token');
  localStorage.removeItem('user_email');
}

function showApp() {
  document.getElementById('authScreen').classList.add('hidden');
  if (isAdmin()) {
    document.getElementById('appWrapper').classList.add('hidden');
    document.getElementById('adminView').classList.remove('hidden');
    document.getElementById('adminUserEmail').textContent = getEmail() || '—';
    loadAdminStats();
    refreshAdminTable();
    refreshInviteTable();
    refreshFeedbackTable();
  } else {
    document.getElementById('adminView').classList.add('hidden');
    document.getElementById('appWrapper').classList.remove('hidden');
    const email = getEmail() || '—';
    document.getElementById('userEmail').textContent = email;
    document.getElementById('userAvatar').textContent = email[0].toUpperCase();
    // Set welcome greeting immediately (stats fill in after data loads)
    const name = email.includes('@') ? email.split('@')[0] : email;
    document.getElementById('homeWelcome').textContent = t('homeWelcomeDefault') + '，' + name;
    loadAll();
    loadSavedResume();
  }
}

function showAuth() {
  document.getElementById('appWrapper').classList.add('hidden');
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
}

function logout() {
  clearSession();
  showAuth();
}

// ── Auth form ──

let authMode = 'login';

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  const isRegister = authMode === 'register';
  document.getElementById('authTitle').textContent      = t(isRegister ? 'authTitleRegister'     : 'authTitleLogin');
  document.getElementById('authSub').textContent        = t(isRegister ? 'authSubRegister'        : 'authSubLogin');
  document.getElementById('authBtn').textContent        = t(isRegister ? 'authBtnRegister'        : 'authBtnLogin');
  document.getElementById('authToggleText').textContent = t(isRegister ? 'authToggleToLogin'      : 'authToggleToRegister');
  document.getElementById('authToggleLink').textContent = t(isRegister ? 'authToggleLinkLogin'    : 'authToggleLinkRegister');
  document.getElementById('inviteRow').style.display    = isRegister ? 'flex' : 'none';
  document.getElementById('authInviteCode').value = '';
  setAuthError('');
}

function setAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

async function submitAuth() {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { setAuthError(t('authErrorFill')); return; }

  const btn = document.getElementById('authBtn');
  btn.disabled = true;
  btn.textContent = t('authBtnLoading');
  setAuthError('');

  const endpoint = authMode === 'register' ? '/auth/register' : '/auth/login';
  const body = { email, password };
  if (authMode === 'register') {
    body.invite_code = document.getElementById('authInviteCode').value.trim();
  }

  try {
    const res = await fetch(`${API}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      setAuthError(data.detail || t('authErrorDefault'));
    } else {
      setSession(data.token, data.email);
      showApp();
    }
  } catch {
    setAuthError(t('authErrorNetwork'));
  }

  btn.disabled = false;
  btn.textContent = t(authMode === 'register' ? 'authBtnRegister' : 'authBtnLogin');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('authScreen').classList.contains('hidden')) {
    submitAuth();
  }
});

const appCache = new Map();

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const FEEDBACK_KEY = {
  'No Response': 'fbOptNoResponse',
  'Fail':            'fbOptFail',
  'Offer':           'fbOptOffer',
  'Interview':       'fbOptInterview',
  'Online Assessment': 'fbOptOA',
};
const WORKTYPE_KEY = { Remote: 'optRemote', Onsite: 'optOnsite', Hybrid: 'optHybrid' };

function badgeHtml(feedback) {
  const key = FEEDBACK_KEY[feedback] || (!feedback || feedback === 'No Response' ? 'fbOptNoResponse' : null);
  const label = key ? t(key) : esc(feedback);
  const cls = { 'Offer': 'badge-offer', 'Fail': 'badge-fail', 'Interview': 'badge-interview', 'Online Assessment': 'badge-oa' }[feedback] || 'badge-pending';
  return `<span class="app-badge ${cls}">${label}</span>`;
}

function cardHtml(app, isNew = false, num = 0) {
  appCache.set(app.id, app);
  const date = app.applied_date ? app.applied_date.slice(0,10) : '—';
  const safeLink = app.link && /^https?:\/\//i.test(app.link);
  const linkHtml = safeLink
    ? `<a href="${esc(app.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:14px;">↗</a>`
    : '<span style="font-size:12px;color:#dcd8d0;">—</span>';
  return `
    <div class="app-card ${isNew ? 'new-card' : ''}" data-feedback="${esc(app.feedback || '')}" onclick="openEdit(${app.id})" style="cursor:pointer;">
      <span class="col-num">${num || ''}</span>
      <span class="col-link">${linkHtml}</span>
      <span class="col-date">${date}</span>
      <span class="col-company">${esc(app.company) || '—'}</span>
      <span class="col-position">${esc(app.position) || '—'}</span>
      <span class="col-location">${esc(app.location) || '—'}</span>
      <span class="col-worktype">${app.work_type ? (WORKTYPE_KEY[app.work_type] ? t(WORKTYPE_KEY[app.work_type]) : esc(app.work_type)) : '—'}</span>
      <span class="col-feedback">${badgeHtml(app.feedback)}</span>
      <span class="col-notes" style="width:36px;flex-shrink:0;font-size:13px;cursor:default;text-align:center;" onclick="event.stopPropagation()" title="${app.notes ? esc(app.notes) : ''}">${app.notes ? '📝' : ''}</span>
      <button class="del-btn" onclick="event.stopPropagation(); deleteApplication(${app.id})" title="✕">✕</button>
    </div>`;
}

async function apiFetch(path, options = {}) {
  const res = await fetch(`${API}${path}`, {
    ...options,
    headers: { ...authHeader(), ...(options.headers || {}) }
  });
  if (res.status === 401) { logout(); return null; }
  return res;
}

function extractJSON(text) {
  // Strip markdown code fences
  let t = text.trim()
    .replace(/^```(?:json)?\s*\n?/i, '')
    .replace(/\n?```\s*$/i, '')
    .trim();
  // Try direct parse first
  try { return JSON.parse(t); } catch {}
  // Find first { ... } pair (brace-balanced)
  let depth = 0, start = -1;
  for (let i = 0; i < t.length; i++) {
    if (t[i] === '{') { if (depth === 0) start = i; depth++; }
    else if (t[i] === '}') { depth--; if (depth === 0 && start >= 0) { try { return JSON.parse(t.slice(start, i + 1)); } catch { start = -1; } } }
  }
  return null;
}

    a.location   || '',
    a.work_type  || '',

  ]);
  const csvContent = [headers, ...rows]
    .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\r\n');

function toggleSort() {
  sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
  document.getElementById('sortIcon').textContent = sortOrder === 'desc' ? '↓' : '↑';
  filterApplications();
}

function filterApplications() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  filteredApps = q
    ? allApps.filter(a =>
        (a.company  || '').toLowerCase().includes(q) ||
        (a.position || '').toLowerCase().includes(q))
    : [...allApps];
  filteredApps.sort((a, b) => {
    if (!a.applied_date && !b.applied_date) return 0;
    if (!a.applied_date) return 1;
    if (!b.applied_date) return -1;
    return sortOrder === 'desc'
      ? b.applied_date.localeCompare(a.applied_date)
      : a.applied_date.localeCompare(b.applied_date);
  });
  currentPage = 1;
  renderPage();
}

function renderPage() {
  const area = document.getElementById('listArea');
  if (filteredApps.length === 0) {
    const q = (document.getElementById('searchInput')?.value || '').trim();
    area.innerHTML = `<div style="color:#999080;font-size:13px;text-align:center;padding:40px 0;">${q ? t('noMatch') : t('noRecords')}</div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  const start = (currentPage - 1) * PAGE_SIZE;
  area.innerHTML = filteredApps.slice(start, start + PAGE_SIZE).map((a, i) => cardHtml(a, false, start + i + 1)).join('');
  renderPagination();
}

function renderPagination() {
  const total = filteredApps.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, total);

  const pages = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
      pages.push(i);
    } else if (pages[pages.length - 1] !== '…') {
      pages.push('…');
    }
  }

  const pageButtons = pages.map(p =>
    p === '…'
      ? `<span style="color:#999080;padding:0 2px;font-size:12px">···</span>`
      : `<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goToPage(${p})">${p}</button>`
  ).join('');

  el.innerHTML = `
    <span style="font-size:12px;color:#999080">${t('paginationInfo', start, end, total)}</span>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>
      ${pageButtons}
      <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>
    </div>`;
}

function goToPage(p) {
  const totalPages = Math.ceil(filteredApps.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderPage();
  document.getElementById('listArea').scrollTop = 0;
}

let _newsCache = null;

async function loadNewsFeed(force = false) {
  if (_newsCache && !force) { renderNewsItems(_newsCache, _newsFilter); return; }
  const area = document.getElementById('newsItemsArea');
  if (!area) return;
  area.innerHTML = '<div class="jd-loading"><span class="jd-spinner"></span>加载中…</div>';

  const results = await Promise.allSettled(NEWS_FEEDS.map(async feed => {
    const res = await apiFetch(`/rss-proxy?url=${encodeURIComponent(feed.url)}`);
    if (!res || !res.ok) return [];
    const text = await res.text();
    return parseRSS(text, feed);
  }));

  _newsCache = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
  _newsCache.sort((a, b) => b.ts - a.ts);
  renderNewsItems(_newsCache);
}

function parseRSS(xmlText, feed) {
  try {
    const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
    return Array.from(doc.querySelectorAll('item')).slice(0, 15).map(item => {
      const title   = item.querySelector('title')?.textContent?.trim() || '';
      const link    = item.querySelector('link')?.textContent?.trim() || '';
      const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
      const raw     = item.querySelector('description')?.textContent || '';
      const desc    = stripHtml(raw).replace(/\s+/g, ' ').trim().slice(0, 130);
      const ts      = pubDate ? new Date(pubDate).getTime() : 0;
      return { title, link, desc, ts, feed };
    }).filter(i => i.title && i.link);
  } catch { return []; }
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || '';
}

function renderNewsItems(items) {
  const area = document.getElementById('newsItemsArea');
  if (!area) return;
  const list = items;
  if (!list.length) {
    area.innerHTML = '<div style="color:#aaa090;text-align:center;padding:40px 0;font-size:13px;">暂无内容</div>';
    return;
  }
  area.innerHTML = list.map(item => {
    const date = item.ts ? new Date(item.ts).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) : '';
    return `<a class="news-item" href="${esc(item.link)}" target="_blank" rel="noopener noreferrer">
      <div class="news-item-meta">
        <span class="news-item-source" style="color:${item.feed.color}">${esc(item.feed.name)}</span>
        ${date ? `<span class="news-item-date">${date}</span>` : ''}
      </div>
      <div class="news-item-title">${esc(item.title)}</div>
      ${item.desc ? `<div class="news-item-desc">${esc(item.desc)}…</div>` : ''}
    </a>`;
  }).join('');
}

function appendBubble(role, text) {
  const empty = document.getElementById('chatEmpty');
  if (empty) empty.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.className = `chat-bubble-wrap ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `chat-bubble ${role}`;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  document.getElementById('chatMessages').appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return bubble;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  const btn = document.getElementById('chatSendBtn');
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendBubble('user', message);
  const thinkingBubble = appendBubble('ai', t('chatThinking'));
  thinkingBubble.classList.add('thinking');

  try {
    const res = await apiFetch('/chat', {
      method: 'POST',
      body: JSON.stringify({ message, history: chatHistory })
    });
    const data = res ? await res.json() : null;
    const answer = data?.answer || t('chatFailed');

    thinkingBubble.classList.remove('thinking');
    thinkingBubble.textContent = answer;

    chatHistory.push({ role: 'user', content: message });
    chatHistory.push({ role: 'assistant', content: answer });
    if (chatHistory.length > 12) chatHistory = chatHistory.slice(-12);
  } catch {
    thinkingBubble.classList.remove('thinking');
    thinkingBubble.textContent = t('chatError');
  }

  btn.disabled = false;
  input.focus();
}

async function parseImageForForm(input) {
  const file = input instanceof File ? input : input.files[0];
  if (!file) return;
  document.getElementById('imgParseArea').style.display = 'none';
  const status = document.getElementById('imgParseStatus');
  status.className = 'img-parse-status';
  status.textContent = t('imgParsing');
  status.style.display = 'flex';
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(`${API}/applications/parse-image`, {
      method: 'POST', body: form,
      headers: { 'Authorization': `Bearer ${getToken()}` }
    });
    if (!res || !res.ok) throw new Error('request failed');
    const d = await res.json();
    if (d.company)       document.getElementById('f-company').value   = d.company;
    if (d.position)      document.getElementById('f-position').value  = d.position;
    if (d.applied_date)  document.getElementById('f-date').value      = d.applied_date;
    if (d.location)      document.getElementById('f-location').value  = d.location;
    if (d.link)          document.getElementById('f-link').value      = d.link;
    if (d.work_type)     document.getElementById('f-worktype').value  = d.work_type;
    if (d.feedback)      document.getElementById('f-feedback').value  = d.feedback;
    document.getElementById('modalForm').style.display = '';
    status.className = 'img-parse-status success';
    status.textContent = '✓ ' + t('imgParseOk');
  } catch {
    document.getElementById('modalForm').style.display = '';
    status.className = 'img-parse-status error';
    status.textContent = '✕ ' + t('imgParseErr');
  }
}

function renderResumeDoc(text) {
  const lines = text.split('\n');
  let html = '';
  let inUl = false;

  const escInline = s => s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');

  for (const raw of lines) {
    const line = raw.trimEnd();
    if (!line.trim()) {
      if (inUl) { html += '</ul>'; inUl = false; }
      continue;
    }
    if (/^# (.+)/.test(line)) {
      if (inUl) { html += '</ul>'; inUl = false; }
      html += `<h1>${escInline(line.slice(2))}</h1>`;
    } else if (/^## (.+)/.test(line)) {
      if (inUl) { html += '</ul>'; inUl = false; }
      html += `<h2>${escInline(line.slice(3))}</h2>`;
    } else if (/^### (.+)/.test(line)) {
      if (inUl) { html += '</ul>'; inUl = false; }
      html += `<h3>${escInline(line.slice(4))}</h3>`;
    } else if (/^[-*•] (.+)/.test(line)) {
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += `<li>${escInline(line.replace(/^[-*•] /,''))}</li>`;
    } else if (/^---+$/.test(line.trim())) {
      if (inUl) { html += '</ul>'; inUl = false; }
      html += '<hr>';
    } else {
      if (inUl) { html += '</ul>'; inUl = false; }
      html += `<p>${escInline(line)}</p>`;
    }
  }
  if (inUl) html += '</ul>';
  return html;
}

      const res  = await apiFetch('/analyze', { method: 'POST', body: JSON.stringify({ message }) });

        : `You are a senior career consultant and resume writing expert. Optimize my resume based on the job description below. Output ONLY the resume body in Markdown format — no explanations, no preamble, no scores.\n\nRequirements:\n- Keep the exact section order and structure of the original resume — do not add, remove, or reorder any sections\n- Preserve all factual details: company names, job titles, dates, schools, degrees — never fabricate or alter them\n- Never invent numbers or percentages that do not exist in the original — only reframe existing ones more compellingly\n- Match the language of the original resume: Chinese in → Chinese out, English in → English out, mixed → keep mixed\n- Optimize wording with strong action verbs and an outcome-focused tone\n- Weave in JD keywords naturally to improve ATS hit rate — no keyword stuffing\n- Keep the same number of bullet points per role as the original\n- Keep total length close to the original — do not significantly expand the content\n- Professional, concise, and compelling tone\n\n[Job Description]\n${jd || '(not provided)'}\n\n[My Original Resume]\n${resume}`;

async function handleResumeUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const nameEl = document.getElementById('jdResumeFileName');
  nameEl.textContent = t('resumeUploading');
  nameEl.style.color = '#888070';
  window._resumePageImages = null;
  window._resumeWordB64 = null;
  try {
    let text = '';
    const isDocx = file.name.endsWith('.docx') ||
      file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
    if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
      [text, window._resumePageImages] = await Promise.all([
        extractPdfText(file),
        extractPdfImages(file)
      ]);
    } else if (isDocx) {
      const ab = await file.arrayBuffer();
      const bytes = new Uint8Array(ab);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      window._resumeWordB64 = btoa(binary);
      text = await file.text();
    } else {
      text = await file.text();
    }
    text = text.trim();
    window._resumeText = text;
    if (text) {
      localStorage.setItem(RESUME_STORAGE_KEY, text);
      localStorage.setItem(RESUME_FILENAME_KEY, file.name);
      nameEl.textContent = file.name;
      nameEl.style.color = '#3a3528';
    } else {
      nameEl.textContent = t('resumeUploadErr');
      nameEl.style.color = '#b0a99c';
    }
  } catch {
    nameEl.textContent = t('resumeUploadErr');
    nameEl.style.color = '#b0a99c';
  }
  input.value = '';
}

async function handleJDUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const nameEl = document.getElementById('jdJDFileName');
  nameEl.textContent = t('resumeUploading');
  nameEl.style.color = '#888070';
  try {
    let text = '';
    if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
      text = await extractPdfText(file);
    } else {
      text = await file.text();
    }
    text = text.trim();
    window._jdFileText = text;
    if (text) {
      nameEl.textContent = file.name;
      nameEl.style.color = '#3a3528';
    } else {
      nameEl.textContent = t('resumeUploadErr');
      nameEl.style.color = '#b0a99c';
    }
  } catch {
    nameEl.textContent = t('resumeUploadErr');
    nameEl.style.color = '#b0a99c';
  }
  input.value = '';
}

async function extractPdfImages(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const images = [];
  const pageCount = Math.min(pdf.numPages, 3);
  for (let i = 1; i <= pageCount; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    images.push(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
  }
  return images;
}

async function extractPdfText(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    pages.push(content.items.map(item => item.str).join(' '));
  }
  return pages.join('\n');
}

function renderJDResult(data) {
  const matched = (data.matched || []).filter(Boolean);
  const gaps    = (data.gaps    || []).filter(Boolean);
  const ats     = (data.ats    || []).filter(Boolean);

  const matchedRows = matched.map(m => {
    const point    = esc(typeof m === 'object' ? (m.point || '') : String(m));
    const evidence = typeof m === 'object' && m.evidence ? esc(m.evidence) : '';
    return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #eef9f4;">
      <span class="match-tag match-tag-hit" style="flex-shrink:0;">✓ ${point}</span>
      ${evidence ? `<span style="font-size:11px;color:#888070;line-height:1.4;">${evidence}</span>` : ''}
    </div>`;
  }).join('');

  const atsTags = ats.map(a => {
    const kw  = esc(typeof a === 'object' ? (a.kw || '') : String(a));
    const hit = typeof a === 'object' ? a.hit : false;
    if (hit === true)       return `<span class="match-tag match-tag-hit">✓ ${kw}</span>`;
    if (hit === 'partial')  return `<span class="match-tag match-tag-partial">~ ${kw}</span>`;
    return `<span class="match-tag" style="background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;">✕ ${kw}</span>`;
  }).join('');

  const hitCount  = ats.filter(a => typeof a === 'object' && (a.hit === true || a.hit === 'partial')).length;
  const atsDelay  = 0.08 + (matched.length ? 0.14 : 0) + (gaps.length ? 0.14 : 0);

  return `
    ${data.summary ? `<div class="result-block-in" style="animation-delay:0s;margin-bottom:20px;">
      <p class="jd-summary-text">${esc(data.summary)}</p>
    </div>` : ''}
    ${(matched.length || gaps.length) ? `
    <div class="jd-divider result-block-in" style="animation-delay:0.08s;"></div>
    <div class="result-block-in" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;animation-delay:0.12s;">
      <div>
        <div class="jd-skills-title" style="color:#065f46;">${t('jdSkillsMatched')}</div>
        <div>${matchedRows}</div>
      </div>
      <div>
        <div class="jd-skills-title" style="color:#991b1b;">${t('jdSkillsMissing')}</div>
        <div>${gaps.map(g => {
          const point    = esc(typeof g === 'object' ? (g.point || '') : String(g));
          const note     = typeof g === 'object' && g.note ? esc(g.note) : '';
          const isHard   = typeof g === 'object' && g.severity === 'hard';
          const tagClass = isHard ? 'match-tag-gap' : 'match-tag-soft';
          const icon     = isHard ? '✕' : '△';
          return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #eef9f4;"><span class="match-tag ${tagClass}" style="flex-shrink:0;">${icon} ${point}</span>${note ? `<span style="font-size:11px;color:#888070;line-height:1.4;">${note}</span>` : ''}</div>`;
        }).join('')}</div>
      </div>
    </div>` : ''}
    ${ats.length ? `
    <div class="jd-divider result-block-in" style="animation-delay:${atsDelay.toFixed(2)}s;"></div>
    <div class="result-block-in" style="margin-bottom:16px;animation-delay:${(atsDelay + 0.04).toFixed(2)}s;">
      <div class="jd-skills-title" style="display:flex;align-items:center;gap:8px;">
        ${t('jdAtsKeywords')}
        <span style="font-size:11px;font-weight:400;color:#888070;">${hitCount} / ${ats.length} ${t('jdAtsHit')}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">${atsTags}</div>
    </div>` : ''}`;
}

async function analyzeMatch() {
  const resume = window._resumeText || '';
  const jd     = [window._jdFileText || '', document.getElementById('jdJD').value.trim()].filter(Boolean).join('\n\n');
  if (!resume || !jd) { alert(t('jdRequired')); return; }

  _jdAnalyzing = true;
  const btn = document.getElementById('jdAnalyzeBtn');
  btn.disabled = true;
  btn.textContent = t('jdAnalyzing');

  const resultBox     = document.getElementById('jdResultBox');
  const resultSection = document.getElementById('jdResultSection');
  resultBox.innerHTML = `<div class="jd-loading"><span class="jd-spinner"></span>${t('jdAnalyzing')}</div>`;
  // Ensure we're on the analyze tab and show loading state
  switchRightTab('analyze');
  document.getElementById('jdEmptyHintBox').style.display = 'none';
  resultSection.style.display = 'block';

  const message = currentLang === 'zh'
    ? `你是资深招聘官，分析职位描述与简历的匹配度。所有输出必须用中文。严格只输出JSON，不含任何其他文字。\n\n匹配度计算：硬性要求满足率（70%权重）+ ATS关键词命中率（30%权重）。硬性要求指学历、证书、必要技能、明确年限等不可绕过的门槛。\n\n输出格式：\n{"summary":"<2-3句，含匹配度百分比及简要计算依据，直接点出最关键匹配点和最致命缺口，语气客观直接>","matched":[{"point":"<匹配点，8字以内>","evidence":"<简历原文依据，15字以内>"},...],"gaps":[{"point":"<缺口，8字以内>","note":"<为何是缺口及影响，15字以内>","severity":"hard或soft"},...],"ats":[{"kw":"<技能/工具/证书/语言>","hit":true或false或"partial"},...]}\n\n规则：matched≤5条，gaps≤5条，ats≤12个。\nseverity说明：hard=硬门槛（缺失基本无缘面试），soft=加分项缺失（有影响但不致命）。\nhit说明：true=简历中明确体现，"partial"=有相关经验但未完全匹配，false=完全缺失。\n\n【职位描述】\n${jd}\n\n【我的简历】\n${resume}`
    : `You are a senior recruiter. Analyze resume-JD fit. Output ONLY valid JSON, no other text.\n\nScoring: match % = hard requirements met (70%) + ATS keyword hit rate (30%). Hard requirements are non-negotiable: degree, certifications, mandatory skills, years of experience explicitly required.\n\nOutput format:\n{"summary":"<2-3 sentences, include match % with brief rationale, name the top strength and the single most critical blocker>","matched":[{"point":"<≤6 words>","evidence":"<direct resume evidence, ≤12 words>"},...],"gaps":[{"point":"<≤6 words>","note":"<why it matters and its impact, ≤12 words>","severity":"hard or soft"},...],"ats":[{"kw":"<skill/tool/cert>","hit":true or false or "partial"},...]}\\n\nRules: matched≤5, gaps≤5, ats≤12.\nseverity: hard=dealbreaker (likely screened out without it), soft=nice-to-have (missing but not fatal).\nhit: true=explicitly in resume, "partial"=related but not exact match, false=absent.\n\n[Job Description]\n${jd}\n\n[My Resume]\n${resume}`;

  try {
    const res = await apiFetch('/analyze', {
      method: 'POST',
      body: JSON.stringify({ message })
    });
    const data = res ? await res.json() : null;

    if (!res || !res.ok) {
      const msg = data?.detail || t('jdAnalyzeFailed');
      resultBox.innerHTML = `<p style="color:#c0392b;text-align:center;padding:40px 0;">${msg}</p>`;
    } else {
      const raw = data?.answer || '';
      const parsed = extractJSON(raw);
      if (!parsed || !parsed.summary) {
        resultBox.innerHTML = `<p style="color:#c0392b;text-align:center;padding:40px 0;">${t('jdAnalyzeFailed')}</p>`;
        return;
      }
      resultBox.innerHTML = renderJDResult(parsed);
      document.getElementById('jdResultSection').dataset.loaded = '1';
    }
  } catch {
    resultBox.innerHTML = `<span style="color:#dc2626;">${t('jdAnalyzeFailed')}</span>`;
  }

  _jdAnalyzing = false;
  btn.disabled = false;
  btn.textContent = t('jdAnalyzeBtn');
}
