<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Track Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f8f9fc;
      height: 100vh;
      display: flex;
      overflow: hidden;
      color: #111827;
    }

    /* ── Auth Screen ── */
    #authScreen {
      position: fixed; inset: 0; z-index: 200;
      background: #f8f9fc;
      display: flex; align-items: center; justify-content: center;
    }
    #authScreen.hidden { display: none; }
    .auth-box {
      background: #fff; border-radius: 16px; padding: 36px 40px;
      width: 400px; max-width: 95vw;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .auth-logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
    }
    .auth-logo-text { font-size: 18px; font-weight: 700; color: #111827; }
    .auth-logo-sub  { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .auth-title { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .auth-sub   { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .auth-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .auth-row label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .auth-row input {
      padding: 10px 13px; border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 13px; color: #111827; outline: none; transition: border-color 0.15s;
    }
    .auth-row input:focus { border-color: #6366f1; }
    .auth-btn {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; margin-top: 6px;
    }
    .auth-btn:hover { opacity: 0.9; }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-toggle {
      text-align: center; margin-top: 16px; font-size: 13px; color: #6b7280;
    }
    .auth-toggle a { color: #6366f1; cursor: pointer; font-weight: 500; text-decoration: none; }
    .auth-toggle a:hover { text-decoration: underline; }
    .auth-error {
      color: #dc2626; font-size: 12px; margin-bottom: 12px;
      background: #fee2e2; padding: 8px 12px; border-radius: 6px;
      display: none;
    }
    .auth-error.show { display: block; }


    /* ── App wrapper ── */
    #appWrapper {
      display: flex; width: 100%; height: 100%;
    }
    #appWrapper.hidden { display: none; }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px; min-width: 300px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      display: flex; flex-direction: column;
      padding: 14px 16px; gap: 10px;
      overflow: hidden;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 9px; display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .logo-text { font-size: 15px; font-weight: 600; color: #111827; }
    .logo-sub  { font-size: 11px; color: #9ca3af; margin-top: 1px; }
    .divider { height: 1px; background: #f3f4f6; }
    .section-title {
      font-size: 10px; font-weight: 600; letter-spacing: 1px;
      color: #9ca3af; text-transform: uppercase; margin-bottom: 8px;
    }
    .add-btn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .add-btn:hover { opacity: 0.9; }
    .stat-row { display: flex; gap: 8px; }
    .stat-card {
      flex: 1; background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 8px 10px;
    }
    .stat-value { font-size: 17px; font-weight: 700; color: #111827; line-height: 1; }
    .stat-label { font-size: 10px; color: #9ca3af; margin-top: 3px; }
    .chart-block {
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 10px;
    }
    .chart-block canvas { max-height: 120px; }
    .chart-block.countries-block { height: 160px; }
    .chart-block.countries-block canvas { max-height: 160px; }

    /* User info in sidebar */
    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .user-email { font-size: 11px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn {
      font-size: 11px; color: #6366f1; background: none; border: none;
      cursor: pointer; font-weight: 500; flex-shrink: 0; padding-left: 8px;
    }
    .logout-btn:hover { text-decoration: underline; }
    .chpwd-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center; }
    .chpwd-overlay.open { display:flex; }
    .chpwd-box { background:#fff; border-radius:12px; padding:28px 24px; width:340px; box-shadow:0 8px 32px rgba(0,0,0,0.15); }
    .chpwd-box h3 { font-size:15px; font-weight:700; margin:0 0 20px; color:#111827; }
    .chpwd-box label { font-size:12px; font-weight:600; color:#374151; display:block; margin-bottom:4px; }
    .chpwd-box input { width:100%; box-sizing:border-box; border:1px solid #e5e7eb; border-radius:8px; padding:8px 10px; font-size:13px; margin-bottom:14px; }
    .chpwd-box input:focus { outline:none; border-color:#6366f1; }
    .chpwd-actions { display:flex; gap:8px; margin-top:4px; }
    .chpwd-actions button { flex:1; padding:9px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; }
    .chpwd-cancel { background:#f3f4f6; color:#374151; }
    .chpwd-submit { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; }
    .chpwd-msg { font-size:12px; margin-bottom:10px; padding:8px 10px; border-radius:6px; display:none; }
    .chpwd-msg.error { display:block; background:#fee2e2; color:#dc2626; }
    .chpwd-msg.success { display:block; background:#d1fae5; color:#059669; }

    /* ── Main ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }

    /* Applications list */
    .list-area {
      flex: 1; overflow-y: auto; padding: 6px 24px 6px;
      display: flex; flex-direction: column; gap: 5px;
    }

    /* Table header */
    .list-header {
      display: flex; align-items: center;
      padding: 0 16px; height: 36px;
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; margin: 14px 24px 12px; flex-shrink: 0;
    }
    .list-header span {
      font-size: 12px; font-weight: 600; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .app-card {
      background: #fff; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 8px 16px;
      display: flex; align-items: center;
      transition: box-shadow 0.15s;
    }
    .app-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); background: #fafafa; }
    .del-btn {
      width: 26px; height: 26px; border-radius: 5px; border: none;
      background: transparent; cursor: pointer; font-size: 14px;
      color: #d1d5db; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .del-btn:hover { background: #fee2e2; color: #dc2626; }
    .app-card.new-card { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .col-company  { flex: 2; min-width: 0; font-size: 13px; font-weight: 600; color: #111827; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 12px; }
    .col-position { flex: 2; min-width: 0; font-size: 12px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 12px; }
    .col-location { flex: 1; min-width: 0; font-size: 12px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
    .col-worktype { flex: 0 0 90px; font-size: 12px; color: #6b7280; padding-right: 8px; }
    .col-link     { flex: 0 0 48px; padding-right: 8px; }
    .col-link a   { font-size: 12px; color: #6366f1; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
    .col-link a:hover { text-decoration: underline; }
    .col-date     { flex: 0 0 116px; font-size: 12px; color: #9ca3af; padding-right: 8px; }
    .col-feedback { flex: 0 0 136px; }

    .app-badge {
      font-size: 11px; font-weight: 500; padding: 3px 8px;
      border-radius: 20px; display: inline-block;
    }
    .badge-pending { background: #f3f4f6; color: #6b7280; }
    .badge-fail    { background: #fee2e2; color: #dc2626; }
    .badge-offer   { background: #d1fae5; color: #059669; }

    /* ── Chat overlay ── */
    .chat-sidebar {
      position: absolute; inset: 0;
      background: #fff;
      display: flex; flex-direction: column;
      z-index: 20;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .chat-sidebar.hidden {
      opacity: 0; pointer-events: none;
      transform: translateY(6px);
    }
    .chat-topbar {
      padding: 0 16px; height: 44px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #e5e7eb;
    }
    .chat-topbar-title { font-size: 13px; font-weight: 600; color: #111827; }
    .chat-topbar-actions { display: flex; gap: 6px; }
    .chat-icon-btn {
      width: 26px; height: 26px; border-radius: 5px; border: none;
      background: transparent; cursor: pointer; font-size: 13px;
      color: #9ca3af; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .chat-icon-btn:hover { background: #f3f4f6; color: #6b7280; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .chat-bubble-wrap { display: flex; flex-direction: column; gap: 3px; }
    .chat-bubble-wrap.user { align-items: flex-end; }
    .chat-bubble-wrap.ai   { align-items: flex-start; }
    .chat-bubble {
      max-width: 75%; padding: 10px 14px;
      border-radius: 12px; font-size: 13px; line-height: 1.6;
    }
    .chat-bubble.user { background: linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border-bottom-right-radius:4px; }
    .chat-bubble.ai   { background: #f3f4f6; color:#111827; border-bottom-left-radius:4px; }
    .chat-bubble.thinking { color: #9ca3af; font-style: italic; }
    .chat-input-area {
      padding: 12px 16px; border-top: 1px solid #e5e7eb;
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .chat-input {
      flex: 1; padding: 9px 13px; border: 1px solid #e5e7eb;
      border-radius: 8px; font-size: 13px; font-family: inherit;
      resize: none; outline: none; max-height: 120px; line-height: 1.5;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: #6366f1; }
    .chat-send-btn {
      padding: 9px 16px; background: linear-gradient(135deg,#6366f1,#8b5cf6);
      color: #fff; border: none; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
    }
    .chat-send-btn:hover { opacity: 0.9; }
    .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: #9ca3af; font-size: 13px;
    }
    .chat-empty-icon { font-size: 32px; }
    .chat-suggestions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 8px; }
    .chat-suggestion {
      padding: 5px 11px; border: 1px solid #e5e7eb; border-radius: 20px;
      font-size: 12px; color: #6b7280; cursor: pointer; background: #fff;
      transition: border-color 0.15s, color 0.15s;
    }
    .chat-suggestion:hover { border-color: #6366f1; color: #6366f1; }

    /* Ask AI toggle button */
    .ask-ai-btn {
      padding: 7px 14px; border-radius: 7px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; font-size: 12px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
    }
    .ask-ai-btn:hover { opacity: 0.9; }
    .search-input {
      flex: 1; max-width: 280px; padding: 7px 12px;
      border: 1px solid #e5e7eb; border-radius: 7px;
      font-size: 13px; color: #111827; outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: #6366f1; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 28px;
      width: 460px; max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #111827; }
    .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .form-row label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-row input, .form-row select {
      padding: 9px 12px; border: 1px solid #e5e7eb; border-radius: 7px;
      font-size: 13px; color: #111827; outline: none; transition: border-color 0.15s;
      background: #fff;
    }
    .form-row input:focus, .form-row select:focus { border-color: #6366f1; }
    .form-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 10px; background: #f3f4f6; border: none;
      border-radius: 7px; font-size: 13px; cursor: pointer; color: #374151;
    }
    .btn-save {
      flex: 2; padding: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 7px; font-size: 13px;
      font-weight: 600; color: #fff; cursor: pointer;
    }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Image parse area ── */
    .img-parse-area {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; margin-top: 16px; margin-bottom: 18px;
      background: #f5f3ff; border: 1.5px dashed #c4b5fd;
      border-radius: 9px; cursor: pointer;
      transition: background 0.15s;
    }
    .img-parse-area:hover { background: #ede9fe; }
    .img-parse-area .img-parse-icon { font-size: 20px; flex-shrink: 0; }
    .img-parse-area .img-parse-text { flex: 1; }
    .img-parse-area .img-parse-text .img-parse-title {
      font-size: 13px; font-weight: 600; color: #5b21b6;
    }
    .img-parse-area .img-parse-text .img-parse-sub {
      font-size: 11px; color: #7c3aed; opacity: 0.7; margin-top: 2px;
    }
    .img-parse-status {
      font-size: 12px; color: #6366f1; margin-bottom: 14px;
      min-height: 18px; display: flex; align-items: center; gap: 6px;
    }
    .img-parse-status.error { color: #ef4444; }
    .img-parse-status.success { color: #10b981; }

    /* ── Admin tabs ── */
    .admin-tabs { display: flex; gap: 0; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
    .admin-tab {
      padding: 10px 20px; font-size: 13px; font-weight: 500;
      color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }
    .admin-tab.active { color: #6366f1; border-bottom-color: #6366f1; }
    .admin-tab-content { display: none; }
    .admin-tab-content.active { display: block; }

    /* ── Admin panel ── */
    #adminPanel {
      position: fixed; inset: 0; z-index: 150;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    #adminPanel.hidden { display: none; }
    .admin-box {
      background: #fff; border-radius: 14px;
      width: 700px; max-width: 96vw; max-height: 85vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    .admin-header {
      padding: 16px 22px; border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .admin-header h2 { font-size: 15px; font-weight: 700; color: #111827; }
    .admin-close {
      width: 26px; height: 26px; border-radius: 6px; border: none;
      background: transparent; cursor: pointer; font-size: 14px;
      color: #9ca3af; display: flex; align-items: center; justify-content: center;
    }
    .admin-close:hover { background: #f3f4f6; color: #6b7280; }
    .admin-body { overflow-y: auto; padding: 16px 22px; flex: 1; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th {
      text-align: left; font-size: 11px; font-weight: 600;
      color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 0 10px 10px;
    }
    .admin-table td { padding: 10px; border-top: 1px solid #f3f4f6; vertical-align: middle; }
    .admin-table tr:hover td { background: #fafafa; }
    .admin-badge-admin { background: #ede9fe; color: #7c3aed; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .admin-badge-user  { background: #f3f4f6; color: #6b7280; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .admin-action-btn {
      font-size: 11px; padding: 4px 9px; border-radius: 5px; border: 1px solid #e5e7eb;
      background: #fff; cursor: pointer; color: #374151; margin-right: 4px;
      transition: background 0.15s;
    }
    .admin-action-btn:hover { background: #f3f4f6; }
    .admin-action-btn.danger { color: #dc2626; border-color: #fecaca; }
    .admin-action-btn.danger:hover { background: #fee2e2; }
    .reset-pw-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
    .reset-pw-input {
      font-size: 12px; padding: 4px 8px; border: 1px solid #e5e7eb;
      border-radius: 5px; outline: none; width: 130px;
    }
    .reset-pw-input:focus { border-color: #6366f1; }

    /* Admin button in sidebar */
    .admin-btn {
      width: 100%; padding: 8px 10px;
      background: #ede9fe; color: #7c3aed;
      border: 1px solid #ddd6fe; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      text-align: left; transition: background 0.15s;
    }
    .admin-btn:hover { background: #ddd6fe; }

    .page-btn {
      min-width: 28px; height: 28px; padding: 0 6px;
      border: 1px solid #e5e7eb; border-radius: 5px;
      background: #fff; font-size: 12px; cursor: pointer;
      color: #374151; transition: background 0.15s, color 0.15s;
    }
    .page-btn:hover:not(:disabled) { background: #f3f4f6; }
    .page-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; cursor: default; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Admin full-page view ── */
    #adminView {
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
      background: #f8f9fc; overflow: hidden;
    }
    #adminView.hidden { display: none; }
    .admin-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 52px; flex-shrink: 0;
      background: #fff; border-bottom: 1px solid #e5e7eb;
    }
    .admin-topbar-left { display: flex; align-items: center; gap: 10px; }
    .admin-topbar-title { font-size: 14px; font-weight: 700; color: #111827; }
    .admin-topbar-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      background: #ede9fe; color: #7c3aed; border-radius: 10px;
    }
    .admin-topbar-right { display: flex; align-items: center; gap: 12px; }
    .admin-layout {
      flex: 1; display: flex; overflow: hidden;
    }
    .admin-nav {
      width: 200px; flex-shrink: 0;
      background: #fff; border-right: 1px solid #e5e7eb;

let currentLang = localStorage.getItem('lang') || 'zh';

function t(key, ...args) {
  const val = LANGS[currentLang][key];
  if (val === undefined) return key;
  return typeof val === 'function' ? val(...args) : val;
}

function applyLang() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('[data-i18n-opt]').forEach(el => {
    el.textContent = t(el.dataset.i18nOpt);
  });

  const label = currentLang === 'zh' ? 'EN' : '中';
  ['langToggle','langToggleAdmin'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = label;
  });
  renderChatSuggestions();
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', currentLang);
  applyLang();
  // re-render dynamic content that depends on language
  if (allApps.length) renderPage();
}

function renderChatSuggestions() {
  const container = document.getElementById('chatSuggestionsContainer');
  if (!container) return;
  container.innerHTML = t('chatSuggestions').map(s =>
    `<button class="chat-suggestion" onclick="sendSuggestion(this)">${esc(s)}</button>`
  ).join('');
}

// ── Auth helpers ──

function getToken() { return localStorage.getItem('jwt_token'); }
function getEmail() { return localStorage.getItem('user_email'); }

function authHeader() {
  return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' };
}

function isAdmin() {
  try {
    const token = getToken();
    if (!token) return false;
    const payload = JSON.parse(atob(token.split('.')[1]));
    return !!payload.adm;
  } catch { return false; }
}

function setSession(token, email) {
  localStorage.setItem('jwt_token', token);
  localStorage.setItem('user_email', email);
}

function clearSession() {
  localStorage.removeItem('jwt_token');
  localStorage.removeItem('user_email');
}

function showApp() {
  document.getElementById('authScreen').classList.add('hidden');
  if (isAdmin()) {
    document.getElementById('appWrapper').classList.add('hidden');
    document.getElementById('adminView').classList.remove('hidden');
    document.getElementById('adminUserEmail').textContent = getEmail() || '—';
    loadAdminStats();
    refreshAdminTable();
    refreshInviteTable();
    refreshFeedbackTable();
  } else {
    document.getElementById('adminView').classList.add('hidden');
    document.getElementById('appWrapper').classList.remove('hidden');
    document.getElementById('userEmail').textContent = getEmail() || '—';
    loadAll();
  }
}

function showAuth() {
  document.getElementById('appWrapper').classList.add('hidden');
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
}

function logout() {
  clearSession();
  showAuth();
}

// ── Auth form ──

let authMode = 'login';

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  const isRegister = authMode === 'register';
  document.getElementById('authTitle').textContent      = t(isRegister ? 'authTitleRegister'     : 'authTitleLogin');
  document.getElementById('authSub').textContent        = t(isRegister ? 'authSubRegister'        : 'authSubLogin');
  document.getElementById('authBtn').textContent        = t(isRegister ? 'authBtnRegister'        : 'authBtnLogin');
  document.getElementById('authToggleText').textContent = t(isRegister ? 'authToggleToLogin'      : 'authToggleToRegister');
  document.getElementById('authToggleLink').textContent = t(isRegister ? 'authToggleLinkLogin'    : 'authToggleLinkRegister');
  document.getElementById('inviteRow').style.display    = isRegister ? 'flex' : 'none';
  document.getElementById('authInviteCode').value = '';
  setAuthError('');
}

function setAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

async function submitAuth() {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { setAuthError(t('authErrorFill')); return; }

  const btn = document.getElementById('authBtn');
  btn.disabled = true;
  btn.textContent = t('authBtnLoading');
  setAuthError('');

  const endpoint = authMode === 'register' ? '/auth/register' : '/auth/login';
  const body = { email, password };
  if (authMode === 'register') {
    body.invite_code = document.getElementById('authInviteCode').value.trim();
  }

  try {
    const res = await fetch(`${API}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      setAuthError(data.detail || t('authErrorDefault'));
    } else {
      setSession(data.token, data.email);
      showApp();
    }
  } catch {
    setAuthError(t('authErrorNetwork'));
  }

  btn.disabled = false;
  btn.textContent = t(authMode === 'register' ? 'authBtnRegister' : 'authBtnLogin');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('authScreen').classList.contains('hidden')) {
    submitAuth();
  }
});

const appCache = new Map();

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const FEEDBACK_KEY = {
  'No Response': 'fbOptNoResponse',
  'Fail':            'fbOptFail',
  'Offer':           'fbOptOffer',
  'Interview':       'fbOptInterview',
  'Online Assessment': 'fbOptOA',
};
const WORKTYPE_KEY = { Remote: 'optRemote', Onsite: 'optOnsite', Hybrid: 'optHybrid' };

function badgeHtml(feedback) {
  const key = FEEDBACK_KEY[feedback] || (!feedback || feedback === 'No Response' ? 'fbOptNoResponse' : null);
  const label = key ? t(key) : esc(feedback);
  return `<span style="font-size:12px;color:#6b7280;">${label}</span>`;
}

function cardHtml(app, isNew = false) {
  appCache.set(app.id, app);
  const date = app.applied_date ? app.applied_date.slice(0,10) : '—';
  const safeLink = app.link && /^https?:\/\//i.test(app.link);
  const linkHtml = safeLink
    ? `<a href="${esc(app.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:14px;">↗</a>`
    : '<span style="font-size:12px;color:#d1d5db;">—</span>';
  return `
    <div class="app-card ${isNew ? 'new-card' : ''}" onclick="openEdit(${app.id})" style="cursor:pointer;">
      <span class="col-link">${linkHtml}</span>
      <span class="col-date">${date}</span>
      <span class="col-company">${esc(app.company) || '—'}</span>
      <span class="col-position">${esc(app.position) || '—'}</span>
      <span class="col-location">${esc(app.location) || '—'}</span>
      <span class="col-worktype">${app.work_type ? (WORKTYPE_KEY[app.work_type] ? t(WORKTYPE_KEY[app.work_type]) : esc(app.work_type)) : '—'}</span>
      <span class="col-feedback">${badgeHtml(app.feedback)}</span>
      ${app.notes ? `<span title="${esc(app.notes)}" style="font-size:13px;cursor:default;" onclick="event.stopPropagation()">📝</span>` : '<span style="width:18px;display:inline-block;"></span>'}
      <button class="del-btn" onclick="event.stopPropagation(); deleteApplication(${app.id})" title="✕">✕</button>
    </div>`;
}

async function apiFetch(path, options = {}) {
  const res = await fetch(`${API}${path}`, {
    ...options,
    headers: { ...authHeader(), ...(options.headers || {}) }
  });
  if (res.status === 401) { logout(); return null; }
  return res;
}

function downloadCSV() {
  if (!allApps.length) return;
  const headers = [
    t('colCompany'), t('colPosition'), t('colDate'),
    t('colLocation'), t('colWorkType'), t('colLink'), t('colFeedback')
  ];
  const rows = allApps.map(a => [
    a.company    || '',
    a.position   || '',
    a.applied_date ? a.applied_date.slice(0, 10) : '',
    a.location   || '',
    a.work_type  || '',
    a.link       || '',
    a.feedback   || ''
  ]);
  const csvContent = [headers, ...rows]
    .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\r\n');
  const blob = new Blob(['﻿' + csvContent, ''], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `jobtrack_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

  if (!allApps.length) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  const headers = [
    LANGS.en.colCompany, LANGS.en.colPosition, LANGS.en.colDate,
    LANGS.en.colLocation, LANGS.en.colWorkType, LANGS.en.colFeedback
  ];
  const rows = allApps.map(a => [
    a.company    || '—',
    a.position   || '—',
    a.applied_date ? a.applied_date.slice(0, 10) : '—',

  doc.autoTable({

function toggleSort() {
  sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
  document.getElementById('sortIcon').textContent = sortOrder === 'desc' ? '↓' : '↑';
  filterApplications();
}

function filterApplications() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  filteredApps = q
    ? allApps.filter(a =>
        (a.company  || '').toLowerCase().includes(q) ||
        (a.position || '').toLowerCase().includes(q))
    : [...allApps];
  filteredApps.sort((a, b) => {
    if (!a.applied_date && !b.applied_date) return 0;
    if (!a.applied_date) return 1;
    if (!b.applied_date) return -1;
    return sortOrder === 'desc'
      ? b.applied_date.localeCompare(a.applied_date)
      : a.applied_date.localeCompare(b.applied_date);
  });
  currentPage = 1;
  renderPage();
}

function renderPage() {
  const area = document.getElementById('listArea');
  if (filteredApps.length === 0) {
    const q = (document.getElementById('searchInput')?.value || '').trim();
    area.innerHTML = `<div style="color:#9ca3af;font-size:13px;text-align:center;padding:40px 0;">${q ? t('noMatch') : t('noRecords')}</div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  const start = (currentPage - 1) * PAGE_SIZE;
  area.innerHTML = filteredApps.slice(start, start + PAGE_SIZE).map(a => cardHtml(a)).join('');
  renderPagination();
}

function renderPagination() {
  const total = filteredApps.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, total);

  const pages = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
      pages.push(i);
    } else if (pages[pages.length - 1] !== '…') {
      pages.push('…');
    }
  }

  const pageButtons = pages.map(p =>
    p === '…'
      ? `<span style="color:#9ca3af;padding:0 2px;font-size:12px">···</span>`
      : `<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goToPage(${p})">${p}</button>`
  ).join('');

  el.innerHTML = `
    <span style="font-size:12px;color:#9ca3af">${t('paginationInfo', start, end, total)}</span>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>
      ${pageButtons}
      <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>
    </div>`;
}

function goToPage(p) {
  const totalPages = Math.ceil(filteredApps.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderPage();
  document.getElementById('listArea').scrollTop = 0;
}

let chatHistory = [];

function clearChat() {
  chatHistory = [];
  const msgs = document.getElementById('chatMessages');
  const empty = document.getElementById('chatEmpty');
  msgs.innerHTML = '';
  empty.style.display = 'flex';
  msgs.appendChild(empty);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

function sendSuggestion(btn) {
  document.getElementById('chatInput').value = btn.textContent;
  sendChat();
}

function appendBubble(role, text) {
  const empty = document.getElementById('chatEmpty');
  if (empty) empty.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.className = `chat-bubble-wrap ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `chat-bubble ${role}`;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  document.getElementById('chatMessages').appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return bubble;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  const btn = document.getElementById('chatSendBtn');
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendBubble('user', message);
  const thinkingBubble = appendBubble('ai', t('chatThinking'));
  thinkingBubble.classList.add('thinking');

  try {
    const res = await apiFetch('/chat', {
      method: 'POST',
      body: JSON.stringify({ message, history: chatHistory })
    });
    const data = res ? await res.json() : null;
    const answer = data?.answer || t('chatFailed');

    thinkingBubble.classList.remove('thinking');
    thinkingBubble.textContent = answer;

    chatHistory.push({ role: 'user', content: message });
    chatHistory.push({ role: 'assistant', content: answer });
    if (chatHistory.length > 12) chatHistory = chatHistory.slice(-12);
  } catch {
    thinkingBubble.classList.remove('thinking');
    thinkingBubble.textContent = t('chatError');
  }

  btn.disabled = false;
  input.focus();
}

async function parseImageForForm(input) {
  const file = input instanceof File ? input : input.files[0];
  if (!file) return;
  document.getElementById('imgParseArea').style.display = 'none';
  const status = document.getElementById('imgParseStatus');
  status.className = 'img-parse-status';
  status.textContent = t('imgParsing');
  status.style.display = 'flex';
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(`${API}/applications/parse-image`, {
      method: 'POST', body: form,
      headers: { 'Authorization': `Bearer ${getToken()}` }
    });
    if (!res || !res.ok) throw new Error('request failed');
    const d = await res.json();
    if (d.company)       document.getElementById('f-company').value   = d.company;
    if (d.position)      document.getElementById('f-position').value  = d.position;
    if (d.applied_date)  document.getElementById('f-date').value      = d.applied_date;
    if (d.location)      document.getElementById('f-location').value  = d.location;
    if (d.link)          document.getElementById('f-link').value      = d.link;
    if (d.work_type)     document.getElementById('f-worktype').value  = d.work_type;
    if (d.feedback)      document.getElementById('f-feedback').value  = d.feedback;
    document.getElementById('modalForm').style.display = '';
    status.className = 'img-parse-status success';
    status.textContent = '✓ ' + t('imgParseOk');
  } catch {
    document.getElementById('modalForm').style.display = '';
    status.className = 'img-parse-status error';
    status.textContent = '✕ ' + t('imgParseErr');
  }
}

  const btn = document.getElementById('btnSave');

    company, position,
    applied_date: document.getElementById('f-date').value || null,
    location:     document.getElementById('f-location').value.trim() || null,
    link:         document.getElementById('f-link').value.trim() || null,
    feedback:     document.getElementById('f-feedback').value || null,
    work_type:    document.getElementById('f-worktype').value || null,
    notes:        document.getElementById('f-notes').value.trim() || null,
  };

  const url    = editingId ? `/applications/${editingId}` : '/applications';
  const method = editingId ? 'PUT' : 'POST';

  const res = await apiFetch(url, { method, body: JSON.stringify(body) });

  if (res && res.ok) {

async function submitChangePwd() {
  const current = document.getElementById('chpwdCurrent').value;
  const newPwd  = document.getElementById('chpwdNew').value;
  const confirm = document.getElementById('chpwdConfirm').value;
  const msg     = document.getElementById('chpwdMsg');
  const btn     = document.getElementById('chpwdSubmitBtn');
  msg.className = 'chpwd-msg';
  if (!current || !newPwd || !confirm) { msg.className = 'chpwd-msg error'; msg.textContent = t('chpwdRequired'); return; }
  if (newPwd.length < 6)               { msg.className = 'chpwd-msg error'; msg.textContent = t('chpwdTooShort'); return; }
  if (newPwd !== confirm)              { msg.className = 'chpwd-msg error'; msg.textContent = t('chpwdMismatch'); return; }
  btn.disabled = true;
  const res = await apiFetch('/auth/change-password', { method: 'PATCH', body: JSON.stringify({ current_password: current, new_password: newPwd }) });
  btn.disabled = false;
  if (!res) return;
  if (res.ok) {
    msg.className = 'chpwd-msg success'; msg.textContent = t('chpwdSuccess');
    setTimeout(closeChangePwd, 1500);
  } else {
    const d = await res.json().catch(() => ({}));
    msg.className = 'chpwd-msg error'; msg.textContent = d.detail || t('chpwdFailed');
  }
}
</script>

<div class="chpwd-overlay" id="chpwdOverlay" onclick="if(event.target===this)closeChangePwd()">
  <div class="chpwd-box">
    <h3 data-i18n="chpwdTitle"></h3>
    <div id="chpwdMsg" class="chpwd-msg"></div>
    <label data-i18n="chpwdCurrent"></label>
    <input id="chpwdCurrent" type="password">
    <label data-i18n="chpwdNew"></label>
    <input id="chpwdNew" type="password">
    <label data-i18n="chpwdConfirm"></label>
    <input id="chpwdConfirm" type="password" onkeydown="if(event.key==='Enter')submitChangePwd()">
    <div class="chpwd-actions">
      <button class="chpwd-cancel" onclick="closeChangePwd()" data-i18n="btnCancel"></button>
      <button class="chpwd-submit" id="chpwdSubmitBtn" onclick="submitChangePwd()" data-i18n="chpwdSubmit"></button>
    </div>
  </div>
</div>
</body>
</html>
