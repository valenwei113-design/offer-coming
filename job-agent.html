async function drawFateCards() {
  const select = document.getElementById('fateAppSelect');
  const appId  = parseInt(select.value);
  if (!appId) { alert(t('fateSelectFirst')); return; }
  const app = allApps.find(a => a.id === appId);
  if (!app) return;

  const envelope = document.getElementById('fateEnvelope');
  if (!envelope) return;
  envelope.classList.add('loading');

  // 标签改为"收取中"
  const label = envelope.querySelector('.fate-envelope-label');
  if (label) label.textContent = t('fateDrawing');

  // 撒星星粒子
  const stars = ['✦','✧','·','✦','✧'];
  const positions = [[20,80],[75,70],[50,90],[10,60],[85,85]];
  stars.forEach((s, i) => {
    const el = document.createElement('span');
    el.className = 'fate-star-particle';
    el.textContent = s;
    el.style.left = positions[i][0] + '%';
    el.style.bottom = positions[i][1] + '%';
    el.style.animationDelay = (i * 0.35) + 's';
    el.style.opacity = '0';
    envelope.appendChild(el);
  });

  const message = currentLang === 'zh'
    ? `你是宇宙本身。请以宇宙的视角，给这位正在求职的人写一封极简短的来信：2到3句话，连续成段，语言凝练有力，富有哲学深度，可借鉴古今中外哲学家的思想意境（如庄子、王阳明、斯多葛、加缪、维特根斯坦等），但不要直接引用或点名。不许出现"——"或任何破折号。只输出正文，无称呼、无落款、无格式符号、无换行。\n\n申请信息：${app.company} — ${app.position}（${app.location || '未知地点'}，当前状态：${app.feedback || '待回复'}）`
    : `You are the universe itself. Write an extremely brief cosmic letter to a job seeker: 2 to 3 sentences in a single flowing paragraph, condensed and philosophical, drawing on the spirit of thinkers across time and culture (Stoics, Zhuangzi, Camus, Wittgenstein, etc.) without naming or quoting them directly. No dashes, no em-dashes, no formatting symbols, no line breaks. Output only the body — no salutation, no signature.\n\nApplication: ${app.company} — ${app.position} (${app.location || 'unknown'}, status: ${app.feedback || 'no response'})`;

  let letter;
  try {
    const res  = await apiFetch('/analyze', { method:'POST', body: JSON.stringify({ message, type: 'fate' }) });
    const data = res ? await res.json() : null;
    letter = (data?.answer || '').trim().replace(/^"+|"+$/g, '').replace(/\n+/g, ' ');
    if (!letter) throw new Error();
  } catch {
    letter = currentLang === 'zh'
      ? '万物并作，吾以观复。\n此刻的停顿，是力量在聚集，而非消散。\n你所寻找的，也在寻找你。'
      : 'The obstacle is the way.\nWhat resists you is also what shapes you.\nTrust the ground beneath the uncertainty.';
  }

  // 清理星星，翻盖动画
  envelope.querySelectorAll('.fate-star-particle').forEach(el => el.remove());
  envelope.classList.remove('loading');
  envelope.classList.add('open');

  // 翻盖完成后淡出信封，显示来信
  setTimeout(() => renderCosmicLetter(letter), 750);
}

function renderCosmicLetter(text) {
  const area = document.getElementById('fateCardsArea');
  area.style.transition = 'opacity 0.35s';
  area.style.opacity = '0';
  setTimeout(() => {
    area.style.transition = '';
    area.style.opacity = '';
    area.innerHTML = `
      <div class="cosmic-letter">
        <div class="cosmic-seal">✦</div>
        <div class="cosmic-from">${currentLang === 'zh' ? '来自宇宙的来信 · FROM THE COSMOS' : 'FROM THE COSMOS · 来自宇宙'}</div>
        <hr class="cosmic-rule">
        <div class="cosmic-body">${esc(text)}</div>
        <div class="cosmic-sig">${currentLang === 'zh' ? '宇宙 · COSMOS' : 'COSMOS · 宇宙'}</div>
      </div>
      <button class="fate-reset-btn" onclick="resetEnvelope()">↩ ${currentLang === 'zh' ? '再收一封' : 'Receive another'}</button>`;
  }, 350);
}

function resetEnvelope() {
  const area = document.getElementById('fateCardsArea');
  area.style.transition = 'opacity 0.3s';
  area.style.opacity = '0';
  setTimeout(() => {
    area.style.transition = '';
    area.style.opacity = '';
    area.innerHTML = `
      <div class="fate-envelope" id="fateEnvelope" onclick="drawFateCards()">
        <div class="fate-envelope-body">
          <div class="fate-envelope-flap"></div>
          <div class="fate-envelope-fold"></div>
          <div class="fate-envelope-center">
            <span class="fate-envelope-label">${t('fateDrawBtn')}</span>
          </div>
        </div>
      </div>`;
  }, 300);
}

function closeChangePwd() {
  document.getElementById('chpwdOverlay').classList.remove('open');
}
async function submitChangePwd() {
  const current = document.getElementById('chpwdCurrent').value;
  const newPwd  = document.getElementById('chpwdNew').value;
  const confirm = document.getElementById('chpwdConfirm').value;
  const msg     = document.getElementById('chpwdMsg');
  const btn     = document.getElementById('chpwdSubmitBtn');
  msg.className = 'chpwd-msg';
  if (!current || !newPwd || !confirm) { msg.className = 'chpwd-msg error'; msg.textContent = t('chpwdRequired'); return; }
  if (newPwd.length < 6)               { msg.className = 'chpwd-msg error'; msg.textContent = t('chpwdTooShort'); return; }
  if (newPwd !== confirm)              { msg.className = 'chpwd-msg error'; msg.textContent = t('chpwdMismatch'); return; }
  btn.disabled = true;
  const res = await apiFetch('/auth/change-password', { method: 'PATCH', body: JSON.stringify({ current_password: current, new_password: newPwd }) });
  btn.disabled = false;
  if (!res) return;
  if (res.ok) {
    msg.className = 'chpwd-msg success'; msg.textContent = t('chpwdSuccess');
    setTimeout(closeChangePwd, 1500);
  } else {
    const d = await res.json().catch(() => ({}));
    msg.className = 'chpwd-msg error'; msg.textContent = d.detail || t('chpwdFailed');
  }
}
